name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip x11-xkb-utils
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm init -y && npm i puppeteer@latest
    
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const path = require("path");
        
        let browser = null;
        let page = null;
        
        async function initBrowser() {
          if (!browser) {
            console.log("🚀 راه‌اندازی مرورگر...");
            browser = await puppeteer.launch({
              headless: false,
              args: [
                '--no-sandbox', 
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--disable-web-security'
              ]
            });
            page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            await new Promise(r => setTimeout(r, 5000));
            console.log("✅ مرورگر آماده");
          }
          return page;
        }
        
        async function executeCommand(cmd) {
          console.log("📄" + cmd);
          const p = await initBrowser();
          
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              const [x, y] = cmd.slice(6).split(" ").map(Number);
              console.log(`🖱️ کلیک: ${x} ${y}`);
              await p.mouse.move(x, y, { steps: 10 });
              await new Promise(r => setTimeout(r, 200));
              await p.mouse.down({ button: 'left' });
              await new Promise(r => setTimeout(r, 50));
              await p.mouse.up({ button: 'left' });
              console.log(`✅ کلیک شد (${x},${y})`);
            } else if (cmd.startsWith("type ")) {
              const text = cmd.slice(5);
              console.log(`⌨️ تایپ: ${text}`);
              await p.click('textarea');
              await new Promise(r => setTimeout(r, 500));
              await p.keyboard.type(text, { delay: 80 });
              console.log(`✅ تایپ شد: ${text}`);
            }
          }
          
          await new Promise(r => setTimeout(r, 2000));
          await p.screenshot({path: "screenshot.png", fullPage: true});
          fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
          console.log("✅OK");
        }
        
        async function cleanup() {
          if (browser) {
            await browser.close();
            browser = null;
            page = null;
          }
        }
        
        (async() => {
          try {
            await executeCommand(process.argv[2]);
          } catch (e) {
            console.error("❌ خطا:", e.message);
          }
          // browser رو نبند - برای دفعه بعد نگه دار
        })();
        EOF
    
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt
        
        COUNTER=0
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 -ac -noreset &
        XVFB_PID=$!
        sleep 3
        
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                node bot.js "$CONTENT"
                git add screenshot* .gitignore
                git commit -m "📸$CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                kill $XVFB_PID || true
                exit 0
              fi
            else
              echo "🔄 تکراری: $CONTENT"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست"
            rm -f last_command.txt
            COUNTER=0
          fi
          
          sleep 60
        done
