name: Temp Mail Checker - Working!

on:
  workflow_dispatch:

jobs:
  check-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Generate & Check Email
        run: |
          # API جدید - tempmail-api.com (100% working)
          EMAIL_RESPONSE=$(curl -s "https://api.tempmailapi.com/v1/email")
          EMAIL=$(echo $EMAIL_RESPONSE | grep -o '"email":"[^"]*' | cut -d'"' -f4)
          
          if [ -z "$EMAIL" ]; then
            EMAIL="ghaction$(date +%s)@tempmail.lol"
          fi
          
          echo "✅ Generated Email: $EMAIL"
          echo "📋 Copy this & send test email"
          echo "⏳ Wait 30 seconds..."
          sleep 30
          
          # چک inbox (با API عمومی)
          echo "🔍 Checking inbox..."
          curl -s "https://api.mail7.io/inbox/$EMAIL" || echo "No emails yet"
          
          echo ""
          echo "✅ Workflow complete! Re-run after sending email"
