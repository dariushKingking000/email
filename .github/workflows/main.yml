name: B - بفرست ۶ رقمی
on: 
  workflow_dispatch:
    inputs:
      numbers:
        description: 'اعداد ۶ رقمی (مثال: 123456)'
        required: true
        default: '123456'

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: بفرست اعداد
      run: |
        echo "${{ github.event.inputs.numbers || '123456' }}" > numbers.txt
        git config user.name "B-Bot"
        git config user.email "bot@github.com"
        git add numbers.txt
        git commit -m "🔑 اعداد ۶ رقمی: ${{ github.event.inputs.numbers || '123456' }} [skip ci]" || echo "هیچ تغییری نبود"
        git push || echo "Push failed - شاید تغییری نبوده"
        
        echo "✅ اعداد فرستاده شد! 👉 A رو Run کن"
        echo "::notice:: numbers.txt: $(cat numbers.txt)"
