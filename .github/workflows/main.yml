name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        let browser = null;
        let page = null;
        let isBrowserReady = false;
        
        function wait(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        async function safeCloseBrowser() {
          try {
            if (browser && browser.isConnected()) {
              await browser.close();
            }
          } catch(e) {}
          browser = null;
          page = null;
          isBrowserReady = false;
        }
        
        async function initBrowser() {
          try {
            if (browser && !browser.isConnected()) {
              await safeCloseBrowser();
            }
            
            if (!browser || !isBrowserReady) {
              console.log("🚀 راه‌اندازی مرورگر...");
              await safeCloseBrowser();
              
              browser = await puppeteer.launch({
                headless: "new",
                args: [
                  "--no-sandbox",
                  "--disable-setuid-sandbox",
                  "--disable-dev-shm-usage",
                  "--disable-gpu"
                ]
              });
              
              page = await browser.newPage();
              await page.setViewport({ width: 1920, height: 1080 });
              
              console.log("🌐 بارگذاری ChatGPT...");
              await page.goto("https://chatgpt.com", { 
                waitUntil: 'domcontentloaded', 
                timeout: 30000 
              });
              
              await wait(3000);
              isBrowserReady = true;
              console.log("✅ مرورگر آماده!");
            }
          } catch(e) {
            console.error("❌ خطای init:", e.message);
            await safeCloseBrowser();
            throw e;
          }
        }
        
        async function takeScreenshot() {
          try {
            console.log("📸 گرفتن اسکرین‌شات...");
            const screenshotBuffer = await page.screenshot({
              type: 'png'
            });
            
            fs.writeFileSync("screenshot.png", screenshotBuffer);
            fs.writeFileSync("screenshot-base64.txt", screenshotBuffer.toString('base64'));
            
            console.log(`✅ اسکرین‌شات: ${screenshotBuffer.length} بایت`);
            return true;
          } catch(e) {
            console.error("❌ خطای screenshot:", e.message);
            return false;
          }
        }
        
        (async (cmd) => {
          console.log("🎯 دستور:", cmd || "screenshot");
          
          try {
            await initBrowser();
            
            if (cmd?.startsWith("click ")) {
              const coords = cmd.slice(6).trim().split(",");
              const x = parseFloat(coords[0]);
              const y = parseFloat(coords[1]);
              
              if (!isNaN(x) && !isNaN(y)) {
                console.log(`🖱️ کلیک: ${x},${y}`);
                await page.mouse.click(x, y);
                await wait(1500);
              }
            }
            
            const success = await takeScreenshot();
            process.exit(success ? 0 : 1);
            
          } catch(e) {
            console.error("💥 خطا:", e.message);
            await safeCloseBrowser();
            process.exit(1);
          }
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Screenshot Bot"
        git config user.email "bot@github.com"
        
        echo "🔄 شروع لوپ بی‌نهایت..."
        rm -f last_command.txt
        
        while true; do
          echo "📥 git pull..."
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            LAST_CMD=$(cat last_command.txt 2>/dev/null || echo "")
            
            echo "📋 دستور: $CONTENT"
            
            if [ "$CONTENT" != "exit" ] && [ "$CONTENT" != "$LAST_CMD" ]; then
              echo "🆕 اجرای: $CONTENT"
              
              node bot.js "$CONTENT"
              
              if [ -f screenshot.png ] && [ -s screenshot.png ]; then
                echo "📸 کامیت screenshot..."
                
                git add -f screenshot.png screenshot-base64.txt
                git add -f bot.js .gitignore
                
                if git diff --staged --quiet; then
                  echo "ℹ️  تغییری نیست"
                else
                  git commit -m "📸 $CONTENT | $(date +%H:%M)"
                  git push origin main || git push origin main --force
                  echo "✅ کامیت و push موفق!"
                fi
                
                echo "$CONTENT" > last_command.txt
              else
                echo "❌ screenshot.png مشکل داره"
              fi
            fi
          fi
          
          echo "--- صبر 20 ثانیه ---"
          sleep 20
        done
