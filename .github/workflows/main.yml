name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        command.txt
        last_command.txt
        command_pipe.txt
        response.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        let browser = null;
        let page = null;
        
        function wait(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        async function initBrowser() {
          console.log("🚀 راه‌اندازی مرورگر...");
          browser = await puppeteer.launch({
            headless: false,
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-gpu",
              "--disable-web-security",
              "--disable-features=VizDisplayCompositor",
              "--window-size=1920,1080",
              "--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            ]
          });
          page = await browser.newPage();
          await page.setViewport({ width: 1920, height: 1080 });
          await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
          
          console.log("🌐 ChatGPT...");
          await page.goto("https://chatgpt.com", { 
            waitUntil: 'networkidle0', 
            timeout: 60000 
          });
          
          await page.waitForTimeout(10000);
          console.log("✅ Cloudflare رد شد - ChatGPT آماده!");
        }
        
        async function takeScreenshot() {
          console.log("📸 Screenshot...");
          await page.screenshot({ path: 'screenshot.png', type: 'png' });
          await page.screenshot({ path: 'screenshot-full.png', fullPage: true, type: 'png' });
          const buffer = await page.screenshot({ type: 'png' });
          fs.writeFileSync("screenshot-base64.txt", buffer.toString('base64'));
          console.log(`✅ Full: ${fs.statSync('screenshot-full.png').size}b`);
          console.log(`✅ Visible: ${fs.statSync('screenshot.png').size}b`);
        }
        
        (async () => {
          await initBrowser();
          
          while (true) {
            try {
              if (fs.existsSync('command_pipe.txt')) {
                const cmd = fs.readFileSync('command_pipe.txt', 'utf8').trim();
                console.log(`🆕 دستور: ${cmd}`);
                
                if (cmd === "exit") {
                  console.log("👋 خروج...");
                  if (browser) await browser.close();
                  process.exit(0);
                }
                
                if (cmd?.startsWith("click ")) {
                  const [x, y] = cmd.slice(6).trim().split(",").map(Number);
                  if (!isNaN(x) && !isNaN(y)) {
                    console.log(`🖱️ Click ${x},${y}`);
                    await page.mouse.click(x, y);
                    await wait(2000);
                  }
                }
                
                await takeScreenshot();
                fs.writeFileSync('response.txt', `✅ ${cmd} تمام!`);
                fs.unlinkSync('command_pipe.txt');
              }
            } catch(e) {
              console.error("❌ خطا:", e.message);
            }
            
            await wait(500);
          }
        })();
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Screenshot Bot"
        git config user.email "bot@github.com"
        
        echo "🔄 لوپ شروع..."
        rm -f last_command.txt command_pipe.txt response.txt
        
        timeout 3600 node bot.js &
        BOT_PID=$!
        echo "🤖 Bot PID: $BOT_PID"
        sleep 30
        
        while true; do
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            LAST_CMD=$(cat last_command.txt 2>/dev/null || echo "")
            
            if [ "$CONTENT" != "exit" ] && [ "$CONTENT" != "$LAST_CMD" ]; then
              echo "🆕 $CONTENT"
              rm -f command_pipe.txt response.txt
              echo "$CONTENT" > command_pipe.txt
              
              for i in {1..60}; do
                if [ -f response.txt ]; then
                  cat response.txt
                  rm -f response.txt command_pipe.txt
                  break
                fi
                sleep 1
              done
              
              sleep 2
              for file in screenshot.png screenshot-full.png screenshot-base64.txt; do
                if [ -f "$file" ] && [ -s "$file" ]; then
                  echo "📁 $file: $(stat -c %s "$file") بایت"
                fi
              done
              
              git add -f screenshot*.png screenshot-base64.txt || true
              git add -f bot.js .gitignore || true
              
              if git diff --staged --quiet; then
                echo "ℹ️  بدون تغییر"
              else
                git commit -m "📸 $CONTENT | $(date)"
                git push origin main || git push origin main --force
                echo "✅ Push OK!"
              fi
              
              echo "$CONTENT" > last_command.txt
            fi
            rm -f command.txt
          fi
          
          sleep 15
        done
        
        kill $BOT_PID 2>/dev/null || true
