name: Screenshot & Auto-Upload with Commands
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: Command Loop + Screenshot
      run: |
        npm init -y
        npm i puppeteer
        
        cat > bot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        async function executeCommand(page, command) {
          console.log(`🔧 Executing: ${command}`);
          
          if (command.startsWith('type ')) {
            const text = command.slice(5).trim();
            await page.keyboard.type(text);
            console.log(`✅ Typed: "${text}"`);
          } 
          else if (command.startsWith('click ')) {
            const [x, y] = command.slice(6).trim().split(' ').map(Number);
            await page.mouse.click(x, y);
            console.log(`✅ Clicked at: ${x}, ${y}`);
          }
          return true;
        }
        
        async function takeScreenshot(page, config) {
          await page.screenshot({path: 'screenshot.png', fullPage: true});
          const imageBuffer = fs.readFileSync('screenshot.png');
          const base64Image = imageBuffer.toString('base64');
          
          fs.writeFileSync('screenshot-base64.txt', base64Image);
          fs.writeFileSync('screenshot.png', imageBuffer);
          
          console.log('📸 Screenshot ready!');
          console.log('📏 Base64 size:', base64Image.length);
          return base64Image;
        }
        
        (async () => {
          const config = {
            url: 'https://chatgpt.com',
            width: 1920,
            height: 1080,
            maxLoops: 30
          };
          
          fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          
          const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox']});
          const page = await browser.newPage();
          await page.setViewport({width: config.width, height: config.height});
          await page.goto(config.url, {waitUntil: 'networkidle2', timeout: 15000});
          
          let lastCommand = '';
          
          for (let i = 0; i < config.maxLoops; i++) {
            console.log(`🔄 Loop ${i+1}/${config.maxLoops}`);
            
            // Check command.txt
            let command = '';
            if (fs.existsSync('command.txt')) {
              command = fs.readFileSync('command.txt', 'utf8').trim();
            }
            
            if (command && command !== lastCommand && (command.startsWith('type ') || command.startsWith('click '))) {
              console.log(`🎯 New command found: "${command}"`);
              await executeCommand(page, command);
              lastCommand = command;
              await new Promise(r => setTimeout(r, 2000)); // 2s delay
            } else if (command) {
              console.log(`⏭️ Same command skipped: "${command}"`);
            } else {
              console.log('⏳ No new command, waiting...');
            }
            
            // Screenshot after each loop
            await takeScreenshot(page, config);
            
            // Wait 1 minute (60s)
            console.log('💤 Sleeping 60 seconds...');
            await new Promise(r => setTimeout(r, 60000));
          }
          
          await browser.close();
          console.log('🏁 Bot finished!');
        })();
        EOF
        
        node bot.js
    
    - name: 🚀 Auto Upload
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add screenshot.png config.json screenshot-base64.txt bot.js command.txt
        git commit -m "🤖 Bot executed [$(date +%Y%m%d-%H%M)]" || exit 0
        git push
        
        SHA=$(git rev-parse HEAD)
        RAW_URL="https://raw.githubusercontent.com/dariushKingking000/email/${{ github.ref_name }}/${SHA}/screenshot-base64.txt"
        echo "✅ UPLOADED! Raw Link: ${RAW_URL}" > upload_log.txt
