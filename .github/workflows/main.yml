name: Screenshot Wait & Check
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: ⏳ 30x Check command.txt (1min)
      run: |
        npm init -y
        npm i puppeteer
        
        cat > screenshot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        (async (url) => {
          const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox']});
          const page = await browser.newPage();
          await page.setViewport({width: 1920, height: 1080});
          await page.goto(url, {waitUntil: 'networkidle2', timeout: 15000});
          await page.screenshot({path: 'screenshot.png', fullPage: true});
          await browser.close();
          const base64 = fs.readFileSync('screenshot.png').toString('base64');
          fs.writeFileSync('screenshot-base64.txt', base64);
        })(process.argv[1]);
        EOF
        
        FOUND=false
        for i in {1..30}; do
          echo "🔍 Check $i/30 - $(date)"
          
          # GitHub API چک کردن command.txt
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/dariushKingking000/email/contents/command.txt?ref=${{ github.ref_name }}")
          
          if echo "$RESPONSE" | grep -q '"name":"command.txt"'; then
            echo "✅ command.txt پیدا شد!"
            URL=$(echo "$RESPONSE" | grep -o '"download_url":"[^"]*' | cut -d'"' -f4)
            CONTENT=$(curl -s "$URL")
            echo "URL: $CONTENT"
            node screenshot.js "$CONTENT"
            FOUND=true
            break
          else
            echo "❌ command.txt نیست"
          fi
          
          sleep 60
        done
        
        if [ "$FOUND" = false ]; then
          echo "❌ 30 دور تموم - ChatGPT"
          node screenshot.js "https://chatgpt.com"
        fi
    
    - name: 🚀 Upload
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add screenshot* *.png
        git commit -m "📸 $(date +%Y%m%d-%H%M)"
        git push
        
        # درست کردن RAW URL
        SHA_SHORT=$(git rev-parse --short HEAD)
        RAW_URL="https://raw.githubusercontent.com/dariushKingking000/email/${{ github.ref_name }}/${SHA_SHORT}/screenshot-base64.txt"
        echo "🔗 $RAW_URL" > raw_url.txt
        echo "✅ $RAW_URL"
