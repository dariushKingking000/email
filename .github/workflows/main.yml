name: ONE EMAIL + CHECK (Fixed Working)

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: 'نام دلخواه (اختیاری)'
        required: false
        default: 'test'

jobs:
  email-check:
    runs-on: ubuntu-latest
    steps:
      - name: Generate & Check REAL Working Email
        run: |
          # ایمیل موقت از 1secmail (100% کار می‌کند)
          NAME="${{ github.event.inputs.custom_name || 'ghaction' }}"
          RAND=$(shuf -i 1000-9999 -n 1)
          EMAIL="$NAME$RAND@1secmail.com"
          
          echo "📧 ایمیل تولید شده: $EMAIL"
          echo "🔗 وب‌سایت چک: https://1secmail.com"
          
          echo "⏳ انتظار 15 ثانیه..."
          sleep 15
          
          echo "🔍 چک کردن صندوق..."
          curl -s "https://www.1secmail.com/api/v3/?action=getMessages&login=${EMAIL%@*}&domain=${EMAIL#*@}" | jq .
          
          echo "✅ لینک مستقیم صندوق: https://1secmail.com/?login=${EMAIL%@*}&domain=${EMAIL#*@}"
          echo "💡 ایمیل را در لینک بالا چک کنید"
