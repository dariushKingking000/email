name: Screenshot & Auto-Upload (Simple)
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: 📄 Log command.txt (فقط لاگ)
      id: read-cmd
      run: |
        if [ -f "command.txt" ]; then
          CONTENT=$(cat command.txt | head -1 | xargs)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT
          echo "✅ command.txt: '$CONTENT'"
        else
          echo "content=" >> $GITHUB_OUTPUT
          echo "❌ command.txt خالی/نداره"
        fi
    
    - name: 📸 Screenshot chatgpt.com
      env:
        CMD_CONTENT: ${{ steps.read-cmd.outputs.content }}
      run: |
        npm init -y
        npm i puppeteer
        
        cat > screenshot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        // همیشه chatgpt.com - command.txt فقط لاگ
        const url = 'https://chatgpt.com';
        
        // لاگ command.txt
        const cmdContent = process.env.CMD_CONTENT || 'خالی';
        console.log(`📄 command.txt: "${cmdContent}"`);
        console.log(`📸 میره: ${url}`);
        
        fs.writeFileSync('config.json', JSON.stringify({url, cmd: cmdContent, timestamp: new Date().toISOString()}, null, 2));
        
        (async () => {
          const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox']});
          const page = await browser.newPage();
          await page.setViewport({width: 1920, height: 1080});
          await page.goto(url, {waitUntil: 'networkidle2', timeout: 30000});
          await page.screenshot({path: 'screenshot.png', fullPage: true});
          await browser.close();
          
          const base64Image = fs.readFileSync('screenshot.png').toString('base64');
          fs.writeFileSync('screenshot-base64.txt', base64Image);
          console.log('📏 Size:', base64Image.length);
          console.log('✅ آماده!');
        })().catch(e => {
          console.error('❌ خطا:', e.message);
          process.exit(1);
        });
        EOF
        
        node screenshot.js
    
    - name: 🚀 Auto Upload
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add screenshot* config.json *.txt
        git commit -m "📸 [$(date +%Y%m%d-%H%M)]"
        git push
        
        SHA=$(git rev-parse --short HEAD)
        RAW_URL="https://raw.githubusercontent.com/dariushKingking000/email/${{ github.ref_name }}/${{ github.sha }}/screenshot-base64.txt"
        echo "$RAW_URL" > raw_url.txt
        echo "✅ $RAW_URL"
    
    - name: ⏳ Wait 5 Minutes
      run: sleep 300
    
    - name: Final Commit
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        echo "$(date): $(cat raw_url.txt)" >> history.txt
        git add raw_url.txt history.txt
        git commit -m "⏰ Final [skip ci]" || true
        git push || true
