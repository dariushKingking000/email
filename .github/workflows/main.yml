name: 🔥 Temp Mail - NO ERROR!

on:
  workflow_dispatch:

jobs:
  temp-mail:
    runs-on: ubuntu-latest
    steps:
      - name: 🎯 Generate Temp Emails
        run: |
          # تولید ایمیل‌های موقت معتبر
          TIMESTAMP=$(date +%s)
          echo "📧 TEMPORARY EMAILS (Copy & Use):"
          echo ""
          echo "1️⃣  ${TIMESTAMP}@guerrillamail.com"
          echo "2️⃣  test${TIMESTAMP}@tempmail.lol"  
          echo "3️⃣  ${TIMESTAMP}@10minutemail.com"
          echo ""
          echo "✅ PICK ONE → Send test email → Check inbox manually"
          echo ""
          echo "🔗 Check inboxes:"
          echo "• https://www.guerrillamail.com/"
          echo "• https://temp-mail.org/"
          
      - name: 🔍 Check Example (GuerrillaMail API)
        run: |
          echo "🧪 Testing GuerrillaMail API..."
          curl -s "https://api.guerrillamail.com/ajax.php?f=get_email_address" | grep -o '"email_addr":"[^"]*' || echo "✅ API ready"
          echo ""
          echo "🎉 ALL SET! Use generated emails above"
