name: ChatGPT Screenshot Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm init -y
        npm install playwright
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Take ChatGPT Screenshot
      run: |
        cat > test.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch({ 
            headless: true,
            args: ['--no-sandbox','--disable-setuid-sandbox']
          });
          const context = await browser.newContext({
            viewport: { width: 1920, height: 1080 }
          });
          const page = await context.newPage();
          console.log('🌐 Loading ChatGPT...');
          await page.goto('https://chatgpt.com', { 
            waitUntil: 'networkidle', timeout: 30000 
          });
          await page.waitForTimeout(3000);
          await page.screenshot({ path: 'chatgpt.png', fullPage: true });
          await page.screenshot({ path: 'chatgpt-thumb.png' });
          await browser.close();
          console.log('✅ Done!');
        })();
EOF
        node test.js
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      with:
        name: chatgpt-screenshots
        path: |
          chatgpt.png
          chatgpt-thumb.png
        retention-days: 30
    
    - name: Update README
      run: |
        echo "# 🖥️ ChatGPT Monitor" > README.md
        echo "" >> README.md
        echo "## 📸 Latest Screenshot" >> README.md
        echo "![ChatGPT](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/chatgpt-screenshots/chatgpt-thumb.png)" >> README.md
        echo "" >> README.md
        echo "**Latest run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> README.md
        echo "**Status:** ${{ job.status }}" >> README.md
        echo "" >> README.md
        echo "*Powered by GitHub Actions*" >> README.md
        
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add README.md
        git commit -m "📸 Update ChatGPT screenshot [skip ci]" || echo "No changes"
        git push
