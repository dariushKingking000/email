name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        let browser = null;
        let page = null;
        
        console.log("🚀 SINGLE BROWSER BOT");
        
        (async(cmd) => {
          console.log("📋 CMD:", cmd);
          
          // Browser reuse
          if (!browser) {
            console.log("🌐 [FIRST TIME] Launch browser");
            browser = await puppeteer.launch({
              headless: true,
              args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-gpu"]
            });
            page = await browser.newPage();
            await page.setViewport({width: 1920, height: 1080});
            await page.goto("https://chatgpt.com", {waitUntil: 'domcontentloaded'});
            await new Promise(r=>setTimeout(r,3000));
            console.log("✅ Browser & page ready - REUSED forever!");
          } else {
            console.log("🔄 [REUSE] Using existing browser");
          }
          
          if (cmd === "exit") {
            console.log("🛑 EXIT - Closing SINGLE browser");
            if (browser) await browser.close();
            process.exit(0);
          }
          
          if (cmd && cmd.startsWith("click ")) {
            const parts = cmd.slice(6).trim().split(",");
            const x = parseInt(parts[0]);
            const y = parseInt(parts[1]);
            console.log(`🖱️ CLICK ${x},${y} on SAME page`);
            
            await page.mouse.click(x, y);
            await new Promise(r=>setTimeout(r,2000));
          }
          
          console.log("📸 Screenshot SAME page");
          await page.screenshot({path: "screenshot.png", fullPage: true});
          
          const data = fs.readFileSync("screenshot.png").toString("base64");
          fs.writeFileSync("screenshot-base64.txt", data);
          
          console.log("✅ DONE - Browser REUSED for next command!");
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "ScreenshotBot"
        git config --global user.email "bot@gh.com"
        
        echo "🎬 SINGLE Browser Bot - REUSES browser!"
        rm -f last_command.txt command.txt screenshot*
        
        while true; do
          echo "🔄 Checking..."
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CMD=$(cat command.txt)
            echo "🚀 EXECUTING: $CMD"
            
            LAST=$(cat last_command.txt 2>/dev/null || echo "")
            if [ "$CMD" != "$LAST" ]; then
              timeout 60 node bot.js "$CMD"
              
              if [ -f screenshot.png ]; then
                git add screenshot.png screenshot-base64.txt .
                git commit -m "📸 SINGLE BROWSER: $CMD" || true
                git push origin main || true
                echo "✅ Screenshot COMMITTED & PUSHED!"
              fi
              
              echo "$CMD" > last_command.txt
            else
              echo "⏭️ Duplicate command"
            fi
            
            rm -f command.txt
          fi
          
          sleep 5
        done
