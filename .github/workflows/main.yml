name: Screenshot Bot
on:
  push:
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install Dependencies
      run: npm init -y && npm install puppeteer
    - name: Setup Files
      run: |
        # --- اصلاح شده .gitignore ---
        # فقط فایل‌هایی که نباید در سورس کنترل باشند اضافه شده‌اند
        cat > .gitignore << EOF
        node_modules/
        screenshot.png
        screenshot-base64.txt
        command.txt
        EOF
        # --- پایان اصلاح شده .gitignore ---

        # --- نسخه اصلاح شده bot.js ---
        # این فایل هر بار در گیت‌هاب اکشن ساخته و نوشته می‌شود
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");

        (async (cmd) => {
          console.log("📄 Command: " + cmd);

          const browser = await puppeteer.launch({
            headless: "new",
            defaultViewport: { width: 1280, height: 800 },
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-blink-features=AutomationControlled",
              "--start-maximized",
              "--disable-gpu"
            ]
          });

          const page = await browser.newPage();

          await page.setUserAgent(
            "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 " +
            "(KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
          );
          await page.evaluateOnNewDocument(() => {
            Object.defineProperty(navigator, "webdriver", { get: () => false });
          });

          console.log("🌐 Visiting ChatGPT...");
          await page.goto("https://chatgpt.com", { waitUntil: "networkidle2" });

          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              const [x, y] = cmd.slice(6).split(" ").map(Number);
              console.log(`🖱 Clicking at ${x},${y}`);
              await page.mouse.click(x, y);
              // استفاده از setTimeout با Promise برای ایجاد تأخیر
              await new Promise(resolve => setTimeout(resolve, 1500)); // جایگزین صحیح
            }

            if (cmd.startsWith("type ")) {
              const text = cmd.slice(5);
              console.log("⌨ Typing:", text);
              await page.keyboard.type(text, { delay: 80 });
              // استفاده از setTimeout با Promise برای ایجاد تأخیر
              await new Promise(resolve => setTimeout(resolve, 1500)); // جایگزین صحیح
            }
          }

          console.log("📸 Taking screenshot...");
          await page.screenshot({ path: "screenshot.png", fullPage: true });

          await browser.close();
          console.log("🔒 Closing browser and saving screenshot...");

          fs.writeFileSync("screenshot-base64.txt",
            fs.readFileSync("screenshot.png").toString("base64")
          );

          console.log("✅ Done");
        })(process.argv[2]);
        EOF
        # --- پایان نسخه اصلاح شده bot.js ---

    - name: Run Bot Loop
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        while true; do
          git pull origin main
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            if [ "$CONTENT" != "exit" ]; then
              echo "Running command: $CONTENT"
              node bot.js "$CONTENT"

              # --- اصلاح شده بخش add و commit ---
              # فقط فایل‌های تولید شده و فایل‌های پیکربندی که نباید ignore شوند اضافه می‌شوند
              git add screenshot* .gitignore bot.js package.json package-lock.json
              # بررسی وضعیت برای جلوگیری از commit خالی
              if ! git diff --cached --exit-code; then
                git commit -m "📸 Bot action: $CONTENT" || echo "No changes to commit"
                git push || echo "Failed to push"
              else
                echo "No changes to commit after bot action."
              fi
              # --- پایان اصلاح شده ---

            else
              echo "Exit command received. Stopping loop."
              break
            fi
          else
            echo "No command.txt found. Waiting..."
          fi
          sleep 60
        done


