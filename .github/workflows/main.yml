name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js click.js type.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const { execSync } = require("child_process");
        (async(cmd) => {
          console.log("📄" + cmd);
          const b = await puppeteer.launch({
            headless: "new",
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-blink-features=AutomationControlled",
              "--disable-dev-shm-usage",
              "--disable-web-security",
              "--disable-features=VizDisplayCompositor",
              "--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
            ]
          });
          const p = await b.newPage();
          await p.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
          await p.setViewport({width: 1920, height: 1080, deviceScaleFactor: 1});
          await p.evaluateOnNewDocument(() => {
            Object.defineProperty(navigator, 'webdriver', {get: () => undefined});
            Object.defineProperty(navigator, 'plugins', {get: () => [1, 2, 3, 4, 5]});
            Object.defineProperty(navigator, 'languages', {get: () => ['en-US', 'en']});
          });
          await p.goto("https://chatgpt.com", {waitUntil: 'networkidle2'});
          await new Promise(r => setTimeout(r, 5000));
          
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              const coords = cmd.slice(6);
              console.log("🖱️ اجرای click.js");
              execSync(`node click.js "${coords}"`, { stdio: 'inherit' });
            } else if (cmd.startsWith("type ")) {
              const text = cmd.slice(5);
              console.log("⌨️ اجرای type.js");
              execSync(`node type.js "${text}"`, { stdio: 'inherit' });
            }
          }
          await new Promise(r => setTimeout(r, 2000));
          await p.screenshot({path: "screenshot.png", fullPage: true});
          await b.close();
          fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
          console.log("✅OK");
        })(process.argv[2]);
        EOF
        
        cat > click.js << 'EOF'
        const puppeteer = require("puppeteer");
        (async() => {
          const browser = await puppeteer.connect({ browserURL: 'http://127.0.0.1:9222' });
          const page = (await browser.pages())[0];
          const [x, y] = process.argv[2].split(" ").map(Number);
          console.log(`🖱️ کلیک واقعی: ${x}, ${y}`);
          await page.mouse.move(x, y);
          await new Promise(r => setTimeout(r, 300));
          await page.mouse.click(x, y);
          await new Promise(r => setTimeout(r, 1000));
        })();
        EOF
        
        cat > type.js << 'EOF'
        const puppeteer = require("puppeteer");
        (async() => {
          const browser = await puppeteer.connect({ browserURL: 'http://127.0.0.1:9222' });
          const page = (await browser.pages())[0];
          const text = process.argv[2];
          console.log(`⌨️ تایپ واقعی: ${text}`);
          await page.click('textarea[placeholder*="Message"]', { timeout: 10000 });
          await new Promise(r => setTimeout(r, 500));
          await page.keyboard.type(text, { delay: 50 });
          await page.keyboard.press('Enter');
        })();
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                node bot.js "$CONTENT"
                git add screenshot* .gitignore
                git commit -m "📸$CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                exit 0
              fi
            else
              echo "🔄 دستور تکراری: $CONTENT"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست کانتر"
            rm -f last_command.txt
            COUNTER=0
          fi
          
          sleep 60
        done
