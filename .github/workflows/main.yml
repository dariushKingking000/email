name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer-extra");
        const StealthPlugin = require("puppeteer-extra-plugin-stealth");
        const fs = require("fs");
        puppeteer.use(StealthPlugin());
        
        (async(cmd) => {
          console.log("📄 Command: " + (cmd || "none"));
          
          const browser = await puppeteer.launch({
            headless: "new",
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-accelerated-2d-canvas",
              "--no-first-run",
              "--disable-gpu",
              "--window-size=1920,1080"
            ],
            defaultViewport: { width: 1920, height: 1080 }
          });
          
          const page = await browser.newPage();
          
          await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
          
          console.log("🌐 Loading chatgpt.com...");
          await page.goto("https://chatgpt.com", { 
            waitUntil: 'domcontentloaded',
            timeout: 60000 
          });
          
          await page.waitForTimeout(5000);
          
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              try {
                const coords = cmd.slice(6).trim().split(",");
                const x = parseInt(coords[0]);
                const y = parseInt(coords[1]);
                console.log(`🖱️ Click at (${x}, ${y})`);
                
                await page.mouse.move(x, y);
                await page.waitForTimeout(500);
                await page.mouse.click(x, y);
                await page.waitForTimeout(2000);
              } catch (e) {
                console.log("❌ Click error: " + e.message);
              }
            }
          }
          
          await page.screenshot({path: "screenshot.png", fullPage: true});
          await browser.close();
          
          fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
          console.log("✅ Done");
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@github.com"
        
        rm -f last_command.txt command.txt screenshot*
        
        echo "🤖 Bot started - create command.txt to begin"
        
        MAX_LOOPS=1000
        COUNTER=0
        
        while [ $COUNTER -lt $MAX_LOOPS ]; do
          git pull origin main --no-edit || true
          
          if [ -f "command.txt" ]; then
            CONTENT=$(cat command.txt 2>/dev/null || echo "")
            
            if [ -f "last_command.txt" ]; then
              LAST_CONTENT=$(cat last_command.txt 2>/dev/null || echo "")
              if [ "$CONTENT" = "$LAST_CONTENT" ]; then
                echo "🔄 Duplicate: $CONTENT"
                sleep 30
                COUNTER=$((COUNTER + 1))
                continue
              fi
            fi
            
            echo "🆕 New: $CONTENT"
            
            if [ "$CONTENT" = "exit" ]; then
              echo "🛑 Exit command received"
              exit 0
            fi
            
            timeout 120 node bot.js "$CONTENT" || echo "⚠️ Bot timeout"
            
            if [ -f "screenshot.png" ]; then
              git add screenshot.png screenshot-base64.txt .gitignore bot.js package* 2>/dev/null || true
              git commit -m "📸 $CONTENT" || true
              git push origin main || true
            fi
            
            echo "$CONTENT" > last_command.txt
            rm -f command.txt
            COUNTER=0
          else
            echo "⏳ Waiting... ($COUNTER/$MAX_LOOPS)"
            sleep 30
            COUNTER=$((COUNTER + 1))
          fi
        done
        
        echo "⏰ Max loops reached"
