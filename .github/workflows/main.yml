# .github/workflows/B-send-numbers.yml
name: B - بفرست ۶ رقمی
on: [workflow_dispatch]

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: بفرست اعداد
      run: |
        echo "123456" > numbers.txt  # ❌ اعداد خودت رو عوض کن
        git config user.name "B-Bot"
        git config user.email "bot@github.com"
        git add numbers.txt
        git commit -m "🔑 اعداد ۶ رقمی برای A"
        git push
        
        echo "✅ اعداد فرستاده شد! A رو Run کن"
