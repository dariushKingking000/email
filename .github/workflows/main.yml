name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        (async(cmd) => {
          console.log("📄" + cmd);
          const b = await puppeteer.launch({
            headless: "new",
            args: ["--no-sandbox"]
          });
          const p = await b.newPage();
          await p.setViewport({width: 1920, height: 1080});
          await p.goto("https://chatgpt.com");
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              const [x, y] = cmd.slice(6).split(" ").map(Number);
              await p.mouse.click(x, y);
              await new Promise(r => setTimeout(r, 2000));
            }
          }
          await p.screenshot({path: "screenshot.png", fullPage: true});
          await b.close();
          fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
          console.log("✅OK");
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        # فایل دستور قبلی رو پاک کن
        rm -f last_command.txt
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            # دستور قبلی رو چک کن
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                node bot.js "$CONTENT"
                git add screenshot* .gitignore
                git commit -m "📸$CONTENT" || true
                git push || true
                
                # دستور فعلی رو ذخیره کن
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                exit 0
              fi
            else
              echo "🔄 دستور تکراری: $CONTENT"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          # بعد 30 بار تکرار (30 دقیقه) ریست کن
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست کانتر"
            rm -f last_command.txt
            COUNTER=0
          fi
          
          sleep 60
        done
