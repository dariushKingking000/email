name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        browser_state.json
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        let browser = null;
        let page = null;
        
        async function initBrowser() {
          if (browser) return;
          console.log("🚀 راه‌اندازی مرورگر...");
          browser = await puppeteer.launch({
            headless: "new",
            args: ["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage"]
          });
          page = await browser.newPage();
          await page.setViewport({width: 1920, height: 1080});
          await page.goto("https://chatgpt.com", {waitUntil: 'networkidle2', timeout: 60000});
          await new Promise(r => setTimeout(r, 5000));
          console.log("✅ مرورگر آماده");
        }
        
        (async(cmd) => {
          console.log("📄 دستور: " + cmd);
          try {
            await initBrowser();
            
            if (cmd?.startsWith("click ")) {
              const coords = cmd.slice(6).trim().split(",");
              const x = parseFloat(coords[0]);
              const y = parseFloat(coords[1]);
              if (!isNaN(x) && !isNaN(y)) {
                console.log(`🖱️ کلیک: ${x},${y}`);
                await page.mouse.click(x, y);
                await new Promise(r => setTimeout(r, 3000));
              }
            }
            
            await page.screenshot({path: "screenshot.png", fullPage: true});
            fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
            console.log("✅OK");
            
          } catch(e) {
            console.error("❌ خطا: " + e.message);
            if (browser) await browser.close();
            browser = null;
          }
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        echo "🔄 شروع لوپ..."
        rm -f last_command.txt
        
        while true; do
          echo "📥 git pull..."
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            LAST_CMD=""
            [ -f last_command.txt ] && LAST_CMD=$(cat last_command.txt)
            
            echo "📋 command.txt: '$CONTENT'"
            echo "📋 last_command.txt: '$LAST_CMD'"
            
            if [ "$CONTENT" != "exit" ]; then
              if [ "$CONTENT" != "$LAST_CMD" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                node bot.js "$CONTENT"
                
                if [ -f screenshot.png ]; then
                  git add screenshot.png screenshot-base64.txt
                  git commit -m "📸 $CONTENT" || true
                  git push || true
                  echo "✅ COMMIT/PUSH موفق"
                fi
                
                echo "$CONTENT" > last_command.txt
              else
                echo "🔄 دستور تکراری: $CONTENT - منتظر تغییر"
              fi
            else
              echo "🛑 خروج"
              exit 0
            fi
          else
            echo "⏳ command.txt وجود ندارد"
          fi
          
          echo "--- صبر 60 ثانیه ---"
          sleep 60
        done
