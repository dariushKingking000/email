name: Check Temp Mail Inbox

on:
  workflow_dispatch:

jobs:
  check-inbox:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        
      - name: Get temp email
        id: email
        run: |
          RESPONSE=$(curl -s "https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1")
          EMAIL=$(echo $RESPONSE | jq -r '.[0]')
          echo "email=$EMAIL" >> $GITHUB_OUTPUT
          echo "email=$EMAIL" >> $GITHUB_ENV
          echo "Generated email: $EMAIL"
      
      - name: Check inbox
        run: |
          EMAIL="${{ steps.email.outputs.email }}"
          DOMAIN=$(echo $EMAIL | cut -d'@' -f2)
          LOGIN=$(echo $EMAIL | cut -d'@' -f1)
          
          echo "Checking inbox for: $EMAIL"
          sleep 15
          
          # لیست ایمیل‌ها
          MESSAGES=$(curl -s "https://www.1secmail.com/api/v1/?action=getMessages&login=$LOGIN&domain=$DOMAIN")
          echo "$MESSAGES" | jq .
          
          # اولین ایمیل رو بخون
          MSG_ID=$(echo "$MESSAGES" | jq -r '.[0].id // empty')
          if [ "$MSG_ID" != "null" ] && [ ! -z "$MSG_ID" ]; then
            echo "Reading email ID: $MSG_ID"
            curl -s "https://www.1secmail.com/api/v1/?action=readMessage&login=$LOGIN&domain=$DOMAIN&id=$MSG_ID" | jq .
          else
            echo "❌ No emails found"
          fi
