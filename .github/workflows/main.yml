name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer puppeteer-extra puppeteer-extra-plugin-stealth puppeteer-extra-plugin-recaptcha
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer-extra");
        const StealthPlugin = require("puppeteer-extra-plugin-stealth");
        const fs = require("fs");
        puppeteer.use(StealthPlugin());
        
        (async(cmd) => {
          console.log("📄 Command: " + cmd);
          
          const browser = await puppeteer.launch({
            headless: "new",
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-accelerated-2d-canvas",
              "--no-first-run",
              "--no-zygote",
              "--disable-gpu",
              "--disable-web-security",
              "--disable-features=VizDisplayCompositor",
              "--window-size=1920,1080"
            ],
            defaultViewport: { width: 1920, height: 1080 }
          });
          
          const page = await browser.newPage();
          
          // Bypass detection
          await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
          await page.setExtraHTTPHeaders({
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
            'Accept-Language': 'en-US,en;q=0.5',
            'Accept-Encoding': 'gzip, deflate, br',
            'DNT': '1',
            'Connection': 'keep-alive',
            'Upgrade-Insecure-Requests': '1',
          });
          
          console.log("🌐 Navigating to chatgpt.com...");
          await page.goto("https://chatgpt.com", { 
            waitUntil: 'domcontentloaded',
            timeout: 90000 
          });
          
          // Wait for page to fully load
          await page.waitForTimeout(8000);
          
          // Log page title to verify load
          const title = await page.title();
          console.log("📋 Page title: " + title);
          
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              try {
                const coords = cmd.slice(6).trim().split(",");
                const x = parseInt(coords[0]);
                const y = parseInt(coords[1]);
                console.log(`🖱️ Clicking at (${x}, ${y})`);
                
                // Move mouse first, then click
                await page.mouse.move(x, y);
                await page.waitForTimeout(500);
                await page.mouse.click(x, y);
                await page.waitForTimeout(3000);
                
                console.log("✅ Click executed");
              } catch (e) {
                console.log("❌ Click error: " + e.message);
              }
            }
          }
          
          console.log("📸 Taking screenshot...");
          await page.screenshot({path: "screenshot.png", fullPage: true});
          
          await browser.close();
          
          const screenshotBuffer = fs.readFileSync("screenshot.png");
          fs.writeFileSync("screenshot-base64.txt", screenshotBuffer.toString("base64"));
          console.log("✅ Screenshot saved");
        })(process.argv[2] || "");
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 New command: $CONTENT"
                node bot.js "$CONTENT"
                git add screenshot* .gitignore bot.js
                git commit -m "📸 $CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 Exit"
                exit 0
              fi
            else
              echo "🔄 Duplicate command"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ Waiting for command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 Reset counter"
            rm -f last_command.txt
            COUNTER=0
          fi
          
          sleep 60
        done
