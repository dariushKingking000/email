name: ONE EMAIL + CHECK

on:
  workflow_dispatch:

jobs:
  email-check:
    runs-on: ubuntu-latest
    steps:
      - name: Generate & Check SINGLE Email
        run: |
          # یک ایمیل ساده
          EMAIL="ghaction$(date +%s)@dropmail.me"
          
          echo "📧 EMAIL: $EMAIL"
          echo "⏳ Wait 20s..."
          sleep 20
          
          echo "🔍 Inbox check:"
          curl -s "https://www.dropmail.me/api/v1/info?add=$EMAIL" || echo "No emails"
          
          echo "✅ $EMAIL - Check: https://www.dropmail.me"
