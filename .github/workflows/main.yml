- name: 🧹 Create .gitignore + Bot
      run: |
        echo "node_modules/
bot.js
package.json
package-lock.json
screenshot.png
screenshot-base64.txt
command.txt" > .gitignore
        
        cat > bot.js << 'EOF'
const puppeteer = require("puppeteer");
const fs = require("fs");
(async (cmd) => {
  console.log("📄 " + cmd);
  const browser = await puppeteer.launch({headless:"new",args:["--no-sandbox","--disable-setuid-sandbox"]});
  const page = await browser.newPage();
  await page.setViewport({width:1920,height:1080});
  await page.goto("https://chatgpt.com",{waitUntil:"networkidle2"});
  if(cmd&&cmd!=="exit"){
    console.log("🚀 "+cmd);
    if(cmd.startsWith("click ")){
      const[x,y]=cmd.slice(6).split(" ").map(Number);
      await page.mouse.click(x,y);
      console.log("🖱️ "+x+","+y);
      await new Promise(r=>setTimeout(r,2000));
    }else if(cmd.startsWith("type ")){
      await page.keyboard.type(cmd.slice(5),{delay:50});
      console.log("⌨️ تایپ");
      await new Promise(r=>setTimeout(r,1500));
    }
  }
  await page.screenshot({path:"screenshot.png",fullPage:true});
  await browser.close();
  const img=fs.readFileSync("screenshot.png");
  const base64=img.toString("base64");
  fs.writeFileSync("screenshot-base64.txt",base64);
  console.log("✅ Files OK");
})(process.argv[2]);
EOF

        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .gitignore bot.js || true
        git commit -m "🤖 Bot setup" || true
        git push origin main || true
