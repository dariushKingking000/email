name: Simple Temp Mail Checker

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Enter temp email'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Inbox
        run: |
          if [ -z "${{ github.event.inputs.email }}" ]; then
            echo "📧 First get email from: https://temp-mail.org/en/"
            echo "🔄 Then re-run & paste email here"
            exit 0
          fi
          
          EMAIL="${{ github.event.inputs.email }}"
          DOMAIN=$(echo $EMAIL | cut -d'@' -f2)
          LOGIN=$(echo $EMAIL | cut -d'@' -f1)
          
          echo "Checking: $EMAIL"
          sleep 10
          
          curl -s "https://www.1secmail.com/api/v1/?action=getMessages&login=$LOGIN&domain=$DOMAIN" || echo "[]"
