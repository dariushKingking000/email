name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        browser_state.json
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const path = require("path");
        
        let browser = null;
        let page = null;
        let isBrowserReady = false;
        
        async function safeCloseBrowser() {
          try {
            if (browser && browser.isConnected()) {
              await browser.close();
            }
          } catch(e) {
            console.log("⚠️ Browser already closed");
          }
          browser = null;
          page = null;
          isBrowserReady = false;
        }
        
        async function initBrowser() {
          try {
            // اگر browser خراب است، ببندش
            if (browser && !browser.isConnected()) {
              await safeCloseBrowser();
            }
            
            if (!browser || !isBrowserReady) {
              console.log("🚀 راه‌اندازی مرورگر...");
              await safeCloseBrowser();
              
              browser = await puppeteer.launch({
                headless: "new",
                args: [
                  "--no-sandbox",
                  "--disable-setuid-sandbox",
                  "--disable-dev-shm-usage",
                  "--disable-gpu",
                  "--disable-web-security",
                  "--disable-features=VizDisplayCompositor"
                ],
                timeout: 60000
              });
              
              page = await browser.newPage();
              await page.setViewport({ width: 1920, height: 1080 });
              
              console.log("🌐 بارگذاری ChatGPT...");
              await page.goto("https://chatgpt.com", { 
                waitUntil: 'networkidle2', 
                timeout: 60000 
              });
              
              // صبر اضافی برای لود کامل
              await page.waitForTimeout(5000);
              isBrowserReady = true;
              console.log("✅ مرورگر کاملاً آماده!");
            }
          } catch(e) {
            console.error("❌ خطای init:", e.message);
            await safeCloseBrowser();
            throw e;
          }
        }
        
        async function takeScreenshot() {
          try {
            if (!page || !isBrowserReady) {
              throw new Error("Page not ready");
            }
            
            console.log("📸 گرفتن اسکرین‌شات...");
            const screenshotBuffer = await page.screenshot({
              type: 'png',
              fullPage: false,
              clip: { x: 0, y: 0, width: 1920, height: 1080 }
            });
            
            // ذخیره فایل
            fs.writeFileSync("screenshot.png", screenshotBuffer);
            fs.writeFileSync("screenshot-base64.txt", screenshotBuffer.toString('base64'));
            
            console.log(`✅ اسکرین‌شات ذخیره شد: ${screenshotBuffer.length} بایت`);
            return true;
          } catch(e) {
            console.error("❌ خطای screenshot:", e.message);
            return false;
          }
        }
        
        (async (cmd) => {
          console.log("🎯 اجرای دستور:", cmd || "screenshot");
          
          try {
            await initBrowser();
            
            // اجرای دستور
            if (cmd?.startsWith("click ")) {
              const coords = cmd.slice(6).trim().split(",");
              const x = parseFloat(coords[0]);
              const y = parseFloat(coords[1]);
              
              if (!isNaN(x) && !isNaN(y) && x > 0 && y > 0) {
                console.log(`🖱️ کلیک در مختصات: ${x},${y}`);
                await page.mouse.click(x, y);
                await page.waitForTimeout(2000); // صبر بعد کلیک
              } else {
                console.log("⚠️ مختصات نامعتبر");
              }
            }
            
            // همیشه screenshot بگیر
            const screenshotOk = await takeScreenshot();
            
            if (screenshotOk) {
              console.log("🎉 موفقیت کامل!");
              process.exit(0);
            } else {
              console.log("⚠️ screenshot ناموفق");
              process.exit(1);
            }
            
          } catch(e) {
            console.error("💥 خطای کلی:", e.message);
            await safeCloseBrowser();
            process.exit(1);
          }
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Screenshot Bot"
        git config user.email "bot@github.com"
        
        echo "🔄 شروع لوپ بی‌نهایت..."
        rm -f last_command.txt
        
        while true; do
          echo "📥 git pull origin main..."
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt | tr -d '\r\n')
            LAST_CMD=""
            [ -f last_command.txt ] && LAST_CMD=$(cat last_command.txt | tr -d '\r\n')
            
            echo "📋 command.txt: '$CONTENT'"
            echo "📋 last_command.txt: '$LAST_CMD'"
            
            if [ "$CONTENT" != "exit" ] && [ "$CONTENT" != "" ]; then
              if [ "$CONTENT" != "$LAST_CMD" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                
                # اجرای bot با timeout
                timeout 120 node bot.js "$CONTENT" || {
                  echo "⚠️ bot.js timeout یا خطا - restart"
                }
                
                # چک دقیق فایل‌ها
                if [ -f screenshot.png ] && [ -s screenshot.png ]; then
                  git add screenshot.png screenshot-base64.txt
                  git commit -m "📸 Screenshot: $CONTENT" || true
                  git push origin main || true
                  echo "✅ COMMIT و PUSH موفق"
                else
                  echo "❌ screenshot.png وجود ندارد یا خالی است"
                fi
                
                echo "$CONTENT" > last_command.txt
              else
                echo "🔄 دستور تکراری - منتظر..."
              fi
            elif [ "$CONTENT" = "exit" ]; then
              echo "🛑 خروج از لوپ"
              exit 0
            fi
          else
            echo "⏳ منتظر command.txt..."
          fi
          
          echo "--- صبر 30 ثانیه ---"
          sleep 30
        done
