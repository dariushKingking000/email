name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        let browser = null;
        let page = null;
        
        async function ensureBrowser() {
          try {
            if (!browser || browser.isClosed?.()) {
              console.log("🌐 باز کردن مرورگر جدید...");
              browser = await puppeteer.launch({
                headless: "new",
                args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-dev-shm-usage", "--disable-web-security"]
              });
              page = await browser.newPage();
              await page.setViewport({width: 1920, height: 1080});
              await page.goto("https://chatgpt.com", { waitUntil: 'networkidle2' });
              console.log("✅ مرورگر آماده");
            }
          } catch(e) {
            console.error("❌ خطای مرورگر:", e.message);
            if (browser) {
              await browser.close();
            }
            browser = null;
            page = null;
            throw e;
          }
        }
        
        (async(cmd) => {
          try {
            console.log("📄 دستور:", cmd);
            await ensureBrowser();
            
            if (cmd && cmd !== "exit") {
              if (cmd.startsWith("click ")) {
                const coords = cmd.slice(6).trim().split(" ");
                const x = parseInt(coords[0]);
                const y = parseInt(coords[1]);
                console.log(`🖱️ کلیک در مختصات: ${x}, ${y}`);
                
                await page.mouse.click(x, y);
                // fix: استفاده از Promise به جای waitForTimeout
                await new Promise(r => setTimeout(r, 3000));
              }
            }
            
            await page.screenshot({path: "screenshot.png", fullPage: true});
            const base64 = fs.readFileSync("screenshot.png").toString("base64");
            fs.writeFileSync("screenshot-base64.txt", base64);
            console.log("✅ اسکرین‌شات ذخیره شد");
            
          } catch(e) {
            console.error("❌ خطا:", e.message);
            if (browser) {
              await browser.close();
              browser = null;
              page = null;
            }
          }
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt | tr -d '\r\n')
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                timeout 120 node bot.js "$CONTENT" || echo "❌ خطا یا timeout"
                git add screenshot.png screenshot-base64.txt .gitignore || true
                git commit -m "📸 $CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                exit 0
              fi
            else
              echo "🔄 دستور تکراری: $CONTENT"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست کانتر"
            rm -f last_command.txt
            COUNTER=0
          fi
          
          sleep 60
        done
