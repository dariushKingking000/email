name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip x11-xkb-utils
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: |
        npm init -y
        npm install puppeteer@latest
    
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        (async(cmd) => {
          console.log("📄" + cmd);
          const b = await puppeteer.launch({
            headless: false,
            args: [
              '--no-sandbox', 
              '--disable-dev-shm-usage',
              '--disable-gpu',
              '--disable-background-timer-throttling',
              '--disable-backgrounding-occluded-windows',
              '--disable-renderer-backgrounding'
            ]
          });
          const p = await b.newPage();
          await p.setViewport({ width: 1920, height: 1080 });
          await p.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
          console.log('✅ ChatGPT لود شد');
          await new Promise(r => setTimeout(r, 3000));
          
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              const [x, y] = cmd.slice(6).split(" ").map(Number);
              await p.mouse.click(x, y);
              console.log(`🖱️ Clicked (${x},${y})`);
            } else if (cmd.startsWith("type ")) {
              const text = cmd.slice(5);
              await p.keyboard.type(text, {delay: 150});
              console.log(`✅ ${text} تایپ شد`);
            }
          }
          await new Promise(r => setTimeout(r, 2000));
          await p.screenshot({path: "screenshot.png", fullPage: true});
          await b.close();
          fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
          console.log("✅OK");
        })(process.argv[2]);
        EOF
    
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                export DISPLAY=:99
                Xvfb :99 -screen 0 1920x1080x24 -ac -noreset &
                sleep 2
                node bot.js "$CONTENT"
                pkill Xvfb || true
                git add screenshot* .gitignore
                git commit -m "📸$CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                exit 0
              fi
            else
              echo "🔄 دستور تکراری: $CONTENT"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست کانتر"
            rm -f last_command.txt
            COUNTER=0
          fi
          
          sleep 60
        done
