name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        console.log("🚀 BOT STARTED");
        
        (async(cmd) => {
          console.log("1️⃣ CMD: " + cmd);
          
          const browser = await puppeteer.launch({
            headless: true,
            args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-gpu"]
          });
          
          console.log("2️⃣ BROWSER OPEN");
          const page = await browser.newPage();
          await page.setViewport({width: 1920, height: 1080});
          
          console.log("3️⃣ GO TO CHATGPT");
          await page.goto("https://chatgpt.com", {waitUntil: 'domcontentloaded'});
          
          // FIXED: use setTimeout instead of waitForTimeout
          await new Promise(resolve => setTimeout(resolve, 4000));
          
          console.log("4️⃣ PAGE LOADED");
          
          if (cmd && cmd.startsWith("click ")) {
            const parts = cmd.slice(6).trim().split(",");
            const x = parseInt(parts[0]);
            const y = parseInt(parts[1]);
            
            console.log(`5️⃣ CLICK ${x},${y}`);
            await page.mouse.click(x, y);
            await new Promise(resolve => setTimeout(resolve, 2000));
            console.log("6️⃣ CLICK DONE");
          }
          
          console.log("7️⃣ SCREENSHOT");
          await page.screenshot({path: "screenshot.png", fullPage: true});
          
          await browser.close();
          console.log("8️⃣ BROWSER CLOSED");
          
          const data = fs.readFileSync("screenshot.png").toString("base64");
          fs.writeFileSync("screenshot-base64.txt", data);
          
          console.log("✅ SUCCESS - screenshot.png created!");
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "ScreenshotBot"
        git config --global user.email "bot@gh.com"
        
        echo "🎬 Screenshot Bot Active!"
        
        while true; do
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CMD=$(cat command.txt)
            echo "🔥 COMMAND: $CMD"
            
            LAST=$(cat last_command.txt 2>/dev/null || echo "")
            if [ "$CMD" != "$LAST" ]; then
              node bot.js "$CMD"
              
              if [ -f screenshot.png ]; then
                git add screenshot.png screenshot-base64.txt
                git commit -m "📷 $CMD" || true
                git push || true
                echo "✅ Screenshot UPLOADED!"
              fi
              
              echo "$CMD" > last_command.txt
            fi
            
            rm -f command.txt
          fi
          
          sleep 10
        done
