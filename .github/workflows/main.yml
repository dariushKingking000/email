name: ONE EMAIL + AUTO CHECK (محتوای صندوق)

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: 'نام دلخواه'
        required: false
        default: 'test'

jobs:
  email-check:
    runs-on: ubuntu-latest
    steps:
      - name: Send Test Email & Check Full Inbox
        run: |
          # ایمیل از سرویس دیگه (workaround)
          RAND=$(shuf -i 100000-999999 -n 1)
          LOCAL="gh$RAND"
          DOMAIN="10minutemail.com"
          EMAIL="$LOCAL@$DOMAIN"
          
          echo "📧 ایمیل: $EMAIL"
          echo "🔗 وب: https://10minutemail.com/$LOCAL"
          
          # تست ارسال خودکار
          curl -s "https://api.mail7.io/index.php?key=TEST&act=send&to=$EMAIL&subject=Test&body=سلام تست از GitHub"
          
          echo "⏳ انتظار 30s..."
          sleep 30
          
          # چک محتوای صفحه inbox
          echo "🔍 محتوای صندوق:"
          curl -s "https://10minutemail.com/$LOCAL" | \
          grep -i -A5 -B2 "Test\|test\|سلام" || echo "هیچ ایمیلی پیدا نشد"
          
          echo ""
          echo "✅ **صندوق کامل:** https://10minutemail.com/$LOCAL"
