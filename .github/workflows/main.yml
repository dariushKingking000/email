name: Screenshot Bot (Real Upload)
on: [push]
permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - name: 🔄 Checkout + Setup
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🖥️ Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    - name: 🔄 MAIN LOOP - Execute Commands Until EXIT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        
        # Create .gitignore if not exists
        touch .gitignore
        echo "node_modules/" >> .gitignore
        echo "bot.js" >> .gitignore
        echo "package.json" >> .gitignore
        echo "package-lock.json" >> .gitignore
        git add .gitignore
        
        npm init -y && npm i puppeteer@24.15.0
        
        LOOP=1
        while [ $LOOP -eq 1 ]; do
          echo "🔍 Loop check ($(date +%H:%M:%S))"
          git fetch origin main
          git reset --hard origin/main
          
          if [ -f "command.txt" ]; then
            CONTENT=$(cat command.txt | head -1 | xargs)
            if [ "$CONTENT" = "exit" ]; then
              echo "🛑 EXIT!"
              LOOP=0
            elif [ -n "$CONTENT" ]; then
              echo "✅ '$CONTENT'"
              node -e "
const puppeteer=require('puppeteer');
const fs=require('fs');
(async(cmd)=>{
  const b=await puppeteer.launch({headless:'new',args:['--no-sandbox']});
  const p=await b.newPage();
  await p.setViewport({width:1920,height:1080});
  await p.goto('https://chatgpt.com',{waitUntil:'networkidle2'});
  if(cmd.startsWith('click ')){
    const[x,y]=cmd.slice(6).split(' ').map(Number);
    await p.mouse.click(x,y);
    console.log('🖱️ '+x+','+y);
  }else if(cmd.startsWith('type ')){
    await p.keyboard.type(cmd.slice(5),{delay:50});
    console.log('⌨️ تایپ');
  }
  await p.screenshot({path:'screenshot.png',fullPage:true});
  await b.close();
  const img=fs.readFileSync('screenshot.png');
  fs.writeFileSync('screenshot-base64.txt',img.toString('base64'));
  console.log('✅ Files OK');
})(process.argv[1]);
" "$CONTENT"
              
              # Always add screenshots - force even if no .gitignore issue
              git add screenshot.png screenshot-base64.txt .gitignore || true
              
              git commit -m "📸 [$(date +%H:%M:%S)] $CONTENT" || echo "⚠️ No commit"
              git push origin main || echo "⚠️ No push"
              echo "📤 Screenshot updated"
            fi
          fi
          sleep 30
        done
        
        sleep 300
        echo "$(date +%H:%M:%S): Complete" >> history.txt
        git add history.txt || true
        git commit -m "⏰ FINAL" || true
        git push origin main || true
