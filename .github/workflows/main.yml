name: Screenshot Bot (Real Upload)
on: [push]
permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - name: 🔄 Checkout + Setup
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🖥️ Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    - name: 🔄 MAIN LOOP - Execute Commands Until EXIT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        npm init -y && npm i puppeteer@22.12.1
        echo 'const puppeteer=require("puppeteer");const fs=require("fs");(async(cmd)=>{console.log("📄 "+cmd);const b=await puppeteer.launch({headless:"new",args:["--no-sandbox"]});const p=await b.newPage();await p.setViewport({width:1920,height:1080});await p.goto("https://chatgpt.com",{waitUntil:"networkidle2"});if(cmd&&cmd!=="exit"){console.log("🚀 "+cmd);if(cmd.startsWith("click ")){const[x,y]=cmd.slice(6).split(" ").map(Number);await p.mouse.click(x,y);console.log("🖱️ "+x+","+y);await new Promise(r=>setTimeout(r,2000));}else if(cmd.startsWith("type ")){await p.keyboard.type(cmd.slice(5));console.log("⌨️ تایپ");await new Promise(r=>setTimeout(r,1000));}}await p.screenshot({path:"screenshot.png",fullPage:true});await b.close();const img=fs.readFileSync("screenshot.png");const base64=img.toString("base64");fs.writeFileSync("screenshot-base64.txt",base64);console.log("✅ OK");})(process.argv[2]);' > bot.js
        
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        
        LOOP=1
        while [ $LOOP -eq 1 ]; do
          echo "🔍 Loop check ($(date +%H:%M:%S))"
          git fetch origin main
          git reset --hard origin/main
          
          if [ -f "command.txt" ]; then
            CONTENT=$(cat command.txt | head -1 | xargs)
            if [ "$CONTENT" = "exit" ]; then
              echo "🛑 EXIT!"
              LOOP=0
            elif [ -n "$CONTENT" ]; then
              echo "✅ '$CONTENT'"
              node bot.js "$CONTENT"
              git add screenshot.png screenshot-base64.txt || true
              git commit -m "📸 [$(date +%H:%M)] $CONTENT" || true
              git push origin main || true
              echo "📤 Uploaded"
            fi
          fi
          echo "⏳ 30s..."
          sleep 30
        done
        
        echo "🎉 5min delay"
        sleep 300
        
        echo "$(date +%H:%M): Complete" >> history.txt
        git add history.txt || true
        git commit -m "⏰ Final" || true
        git push origin main || true
