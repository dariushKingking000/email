name: ChatGPT Screenshot Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm init -y && npm install playwright
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Take ChatGPT Screenshot
      run: |
        node -e "
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch({headless:true,args:['--no-sandbox']});
          const page = await browser.newPage({viewport:{width:1920,height:1080}});
          await page.goto('https://chatgpt.com',{waitUntil:'networkidle'});
          await page.screenshot({path:'chatgpt.png',fullPage:true});
          await page.screenshot({path:'chatgpt-thumb.png'});
          await browser.close();
          console.log('✅ Screenshot saved');
        })().catch(console.error);
        "
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      with:
        name: chatgpt-screenshots
        path: |
          chatgpt.png
          chatgpt-thumb.png
        retention-days: 30
    
    - name: Update README
      run: |
        echo "# ChatGPT Monitor" > README.md
        echo "" >> README.md
        echo "![ChatGPT](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/6763356163/chatgpt-thumb.png)" >> README.md
        echo "" >> README.md
        echo "[Latest Run]($GITHUB_SERVER_URL/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})" >> README.md
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git commit -m "Update screenshot [skip ci]" || exit 0
        git push
