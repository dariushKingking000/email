name: Check Temp Mail Inbox

on:
  workflow_dispatch:

jobs:
  check-inbox:
    runs-on: ubuntu-latest
    steps:
      - name: Get temp email & check inbox
        run: |
          # تولید ایمیل موقت
          RESPONSE=$(curl -s "https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1")
          echo "API Response: $RESPONSE"
          
          if [ -z "$RESPONSE" ] || [ "$RESPONSE" = "[]" ]; then
            echo "❌ API failed, trying alternative..."
            # API جایگزین
            EMAIL="test$(date +%s)@tempmail.lol"
          else
            EMAIL=$(echo $RESPONSE | sed 's/\[\"\(.*\)\"\]/\1/' | tr -d '"')
          fi
          
          DOMAIN=$(echo $EMAIL | cut -d'@' -f2)
          LOGIN=$(echo $EMAIL | cut -d'@' -f1)
          
          echo "✅ Generated: $EMAIL"
          echo "Login: $LOGIN | Domain: $DOMAIN"
          
          # صبر برای ایمیل
          echo "⏳ Waiting 20s for emails..."
          sleep 20
          
          # چک inbox
          curl -s "https://www.1secmail.com/api/v1/?action=getMessages&login=$LOGIN&domain=$DOMAIN"
          
          echo "✅ Done! Send test email to: $EMAIL"
