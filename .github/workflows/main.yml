name: Screenshot Bot - Fixed Upload
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
  id-token: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    - name: Install Dependencies
      run: |
        npm init -y
        npm i puppeteer@latest
    
    - name: Create Bot Files
      run: |
        cat > .gitignore << 'EOF'
        node_modules/
        bot.js
        package.json
        package-lock.json
        command.txt
        last_command.txt
        command_pipe.txt
        response.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        let browser = null;
        let page = null;
        
        async function wait(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        async function initBrowser() {
          console.log("🚀 Starting browser...");
          browser = await puppeteer.launch({
            headless: "new",
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-gpu",
              "--window-size=1920,1080"
            ]
          });
          page = await browser.newPage();
          await page.setViewport({ width: 1920, height: 1080 });
          
          await page.goto("https://chatgpt.com", { 
            waitUntil: 'networkidle0', 
            timeout: 60000 
          });
          await wait(3000);
          console.log("✅ Browser ready!");
        }
        
        async function takeScreenshots() {
          console.log("📸 Taking screenshots...");
          
          // Normal screenshot
          await page.screenshot({ 
            path: 'screenshot.png', 
            type: 'png'
          });
          
          // Full page
          await page.screenshot({ 
            path: 'screenshot-full.png', 
            fullPage: true, 
            type: 'png'
          });
          
          // Base64 version
          const buffer = await page.screenshot({ type: 'png' });
          fs.writeFileSync('screenshot-base64.txt', buffer.toString('base64'));
          
          console.log("✅ Screenshots saved!");
        }
        
        (async () => {
          await initBrowser();
          
          while (true) {
            if (fs.existsSync('command_pipe.txt')) {
              const cmd = fs.readFileSync('command_pipe.txt', 'utf8').trim();
              console.log(`Command: ${cmd}`);
              
              if (cmd === "exit") {
                await browser.close();
                process.exit(0);
              }
              
              if (cmd.startsWith("click ")) {
                const [x, y] = cmd.slice(6).split(",").map(Number);
                await page.mouse.click(x, y);
                await wait(2000);
              }
              
              await takeScreenshots();
              fs.writeFileSync('response.txt', `OK: ${cmd}`);
              fs.unlinkSync('command_pipe.txt');
            }
            await wait(1000);
          }
        })();
        EOF
    
    - name: Run Bot & Monitor
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Screenshot Bot"
        git config user.email "bot@gh.com"
        
        # Clean old files
        rm -f *.png *.txt command* last*
        
        # Start bot
        node bot.js &
        BOT_PID=$!
        sleep 25
        
        # Monitor loop
        while true; do
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CMD=$(cat command.txt)
            echo "🆕 New command: $CMD"
            
            echo "$CMD" > command_pipe.txt
            
            # Wait for response
            for i in {1..60}; do
              if [ -f response.txt ]; then
                echo "$(cat response.txt)"
                break
              fi
              sleep 1
            done
            
            sleep 3
            rm -f command.txt response.txt command_pipe.txt
          fi
          
          # FORCE ADD ALL SCREENSHOTS
          echo "📁 Checking screenshots..."
          for file in screenshot.png screenshot-full.png screenshot-base64.txt; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || echo 0)
              echo "Found $file ($size bytes)"
              git add -f "$file" || echo "Failed to add $file"
            fi
          done
          
          # COMMIT & PUSH EVERY TIME
          if git diff --staged --name-only | grep -q "screenshot"; then
            git add -A
            git commit -m "📸 Screenshot: $(cat command.txt 2>/dev/null || echo 'auto') | $(date)" || true
            git push origin main -f || git push origin main
            echo "✅ PUSHED SCREENSHOTS!"
          fi
          
          sleep 10
        done &
        
        wait $BOT_PID
