name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip x11-xkb-utils
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: |
        npm init -y
        npm install puppeteer@latest
    
    - name: Setup Persistent Browser
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js browser.pid
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const { spawn } = require("child_process");
        
        const PID_FILE = "browser.pid";
        const WS_FILE = "browser-ws.json";
        
        async function getBrowser() {
          if (fs.existsSync(PID_FILE)) {
            const pid = parseInt(fs.readFileSync(PID_FILE, 'utf8'));
            try {
              process.kill(pid, 0); // چک زنده بودن
              if (fs.existsSync(WS_FILE)) {
                const wsEndpoint = JSON.parse(fs.readFileSync(WS_FILE, 'utf8')).webSocketDebuggerUrl;
                return await puppeteer.connect({ browserWSEndpoint: wsEndpoint });
              }
            } catch(e) {
              console.log("🔄 Browser مرده، restart...");
              fs.unlinkSync(PID_FILE);
            }
          }
          
          console.log("🚀 Browser جدید...");
          const browser = await puppeteer.launch({
            headless: false,
            args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu', '--remote-debugging-port=9222', '--remote-debugging-address=0.0.0.0']
          });
          
          fs.writeFileSync(PID_FILE, browser.process().pid.toString());
          const ws = await browser.wsEndpoint();
          fs.writeFileSync(WS_FILE, JSON.stringify({webSocketDebuggerUrl: ws}));
          
          const page = await browser.newPage();
          await page.setViewport({ width: 1920, height: 1080 });
          await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
          await new Promise(r => setTimeout(r, 5000));
          return browser;
        }
        
        (async(cmd) => {
          console.log("📄" + cmd);
          const browser = await getBrowser();
          const pages = await browser.pages();
          const p = pages[0];
          
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              const [x, y] = cmd.slice(6).split(" ").map(Number);
              await p.mouse.click(x, y);
              console.log(`🖱️ Clicked (${x},${y})`);
            } else if (cmd.startsWith("type ")) {
              const text = cmd.slice(5);
              await p.evaluate(() => document.querySelector('textarea')?.focus());
              await p.keyboard.type(text, {delay: 100});
              console.log(`⌨️ Typed: ${text}`);
            }
          }
          await new Promise(r => setTimeout(r, 2000));
          await p.screenshot({path: "screenshot.png", fullPage: true});
          fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
          console.log("✅OK");
        })(process.argv[2]);
        EOF
    
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 -ac -noreset &
        export DISPLAY=:99
        sleep 3
        
        rm -f last_command.txt browser.pid browser-ws.json
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                node bot.js "$CONTENT"
                git add screenshot* .gitignore browser.*
                git commit -m "📸$CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                pkill -f puppeteer || true
                rm -f browser.pid browser-ws.json
                exit 0
              fi
            else
              echo "🔄 تکراری: $CONTENT"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست"
            rm -f last_command.txt browser.pid browser-ws.json
            COUNTER=0
          fi
          
          sleep 60
        done
