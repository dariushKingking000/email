name: ChatGPT Screenshot Monitor

on:
  workflow_dispatch:  # دستی اجرا کن
  schedule:
    - cron: '*/30 * * * *'  # هر 30 دقیقه

permissions:
  contents: write  # 👈 این خط حیاتیه!

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # 👈 اینم اضافه کن
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm init -y
        npm install playwright
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Take ChatGPT Screenshot
      run: |
        cat > test.js << 'EOF'
        const { chromium } = require('playwright');
        
        (async () => {
          try {
            const browser = await chromium.launch({ 
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-accelerated-2d-canvas',
                '--no-first-run',
                '--no-zygote',
                '--disable-gpu'
              ]
            });
            
            const context = await browser.newContext({
              viewport: { width: 1920, height: 1080 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
            });
            
            const page = await context.newPage();
            
            console.log('🌐 Navigating to ChatGPT...');
            await page.goto('https://chatgpt.com', { 
              waitUntil: 'networkidle',
              timeout: 30000 
            });
            
            await page.waitForTimeout(3000);
            
            const title = await page.title();
            console.log(`📄 Page title: ${title}`);
            
            await page.screenshot({ path: 'chatgpt.png', fullPage: true });
            console.log('✅ Screenshot saved');
            
            await page.screenshot({ path: 'chatgpt-thumb.png' });
            console.log('✅ Thumbnail saved');
            
            await browser.close();
            console.log('🎉 Done!');
          } catch (error) {
            console.error('❌ Error:', error.message);
            process.exit(1);
          }
        })();
EOF
        node test.js
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      with:
        name: chatgpt-screenshots
        path: |
          chatgpt.png
          chatgpt-thumb.png
        retention-days: 30
    
    - name: Update README
      if: always()
      run: |
        # بساز README جدید
        cat > README.md << EOF
# 🖥️ ChatGPT Monitor
        
## 📸 Latest Screenshot
![ChatGPT](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ github.run_attempt }}/chatgpt-screenshots/chatgpt-thumb.png)

**Latest run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) Status:** ${{ job.status }} | **Time:** $(date)
        
---
*Powered by [GitHub Actions](https://github.com/features/actions)*
EOF
        
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add README.md
        git commit -m "📸 Update ChatGPT screenshot [skip ci]" || echo "No changes"
        git push || echo "Push failed - check permissions"
