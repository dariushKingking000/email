name: Screenshot Bot (Real Upload)
on: [push]
permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - name: 🔄 Checkout + Setup
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🖥️ Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    - name: ⏳ Wait for command (30x)
      id: wait-cmd
      run: |
        FOUND=0
        for i in {1..30}; do
          echo "🔍 $i/30 ($(date +%H:%M:%S))"
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          if [ -f "command.txt" ]; then
            CONTENT=$(cat command.txt | head -1 | xargs)
            if [ -n "$CONTENT" ]; then
              echo "✅ '$CONTENT'"
              echo "content=$CONTENT" >> $GITHUB_OUTPUT
              FOUND=1
              break
            fi
          fi
          echo "⏳ 1min"
          sleep 60
        done
        if [ $FOUND -eq 0 ]; then
          echo "content=" >> $GITHUB_OUTPUT
          echo "❌ خالی"
        fi
    
    - name: 🤖 Bot Execute
      env:
        CMD_CONTENT: ${{ steps.wait-cmd.outputs.content }}
      run: |
        npm init -y && npm i puppeteer && \
        echo 'const puppeteer = require("puppeteer");const fs = require("fs");(async()=>{const cmdContent=process.env.CMD_CONTENT||" ";console.log(`📄 "${cmdContent}"`);const browser=await puppeteer.launch({headless:"new",args:["--no-sandbox"]});const page=await browser.newPage();await page.setViewport({width:1920,height:1080});await page.goto("https://chatgpt.com",{waitUntil:"networkidle2"});if(cmdContent){console.log(`🚀 ${cmdContent}`);if(cmdContent.startsWith("click ")){const[x,y]=cmdContent.slice(6).split(" ").map(Number);await page.mouse.click(x,y);console.log(`🖱️ ${x},${y}`);await page.waitForTimeout(2000);}else if(cmdContent.startsWith("type ")){await page.keyboard.type(cmdContent.slice(5));console.log("⌨️ تایپ");await page.waitForTimeout(1000);}}await page.screenshot({path:"screenshot.png",fullPage:true});await browser.close();const imgBuffer=fs.readFileSync("screenshot.png");const base64=imgBuffer.toString("base64");fs.writeFileSync("screenshot-base64.txt",base64);console.log("📏",base64.length);console.log("✅ Files OK");})();' > bot.js && node bot.js
    
    - name: 🚀 REAL Upload
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add screenshot.png screenshot-base64.txt *.txt || true
        git commit -m "📸 [$(date +%H:%M)]" || true
        git push origin HEAD:${{ github.ref_name }} || true
        COMMIT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "latest")
        RAW_URL="https://raw.githubusercontent.com/dariushKingking000/email/${{ github.ref_name }}/${COMMIT_SHA}/screenshot-base64.txt"
        echo "🔗 $RAW_URL" > raw_url.txt
    
    - name: ⏳ 5min
      run: sleep 300
    
    - name: 📝 Final
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        echo "$(date +%H:%M): $(cat raw_url.txt 2>/dev/null || echo no-url)" >> history.txt || true
        git add raw_url.txt history.txt || true
        git commit -m "⏰ Final" || true
        git push origin HEAD:${{ github.ref_name }} || true
