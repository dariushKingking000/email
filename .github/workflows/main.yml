# .github/workflows/main.yml
name: ChatGPT Screenshot Monitor

on:
  workflow_dispatch:  # دستی اجرا کن
  schedule:
    - cron: '*/30 * * * *'  # هر 30 دقیقه

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm init -y
        npm install playwright
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
    
    - name: Take ChatGPT Screenshot
      run: |
        cat > test.js << 'EOF'
        const { chromium } = require('playwright');
        const fs = require('fs');
        
        (async () => {
          const browser = await chromium.launch({ headless: false });
          const page = await browser.newPage();
          
          await page.goto('https://chatgpt.com');
          await page.waitForTimeout(5000);
          
          // Base64 برای log
          const screenshot = await page.screenshot({ encoding: 'base64' });
          console.log(🎥 CHATGPT_SCREENSHOT_BASE64: ${screenshot});
          
          // ذخیره فایل
          await page.screenshot({ path: 'chatgpt.png' });
          console.log('✅ Screenshot saved: chatgpt.png');
          
          await browser.close();
        })();
        EOF
        
        node test.js
    
    - name: Upload screenshot artifact
      uses: actions/upload-artifact@v4
      with:
        name: chatgpt-screenshots
        path: chatgpt.png
        retention-days: 7
    
    - name: Update README with latest screenshot
      run: |
        echo "## Latest ChatGPT Screenshot" >> $GITHUB_STEP_SUMMARY
        echo "![ChatGPT](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
