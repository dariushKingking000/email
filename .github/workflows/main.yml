name: Screenshot
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: Screenshot + Base64
      run: |
        npm init -y
        npm i puppeteer
        cat > screenshot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        // JSON config
        const config = {
          url: 'https://chatgpt.com',
          width: 1920,
          height: 1080,
          timestamp: new Date().toISOString()
        };
        fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        
        (async () => {
          const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox']});
          const page = await browser.newPage();
          await page.setViewport({width: config.width, height: config.height});
          await page.goto(config.url, {waitUntil: 'networkidle2', timeout: 15000});
          await page.screenshot({path: 'screenshot.png', fullPage: true});
          await browser.close();
          
          // 🔥 BASE64 تبدیل
          const imageBuffer = fs.readFileSync('screenshot.png');
          const base64Image = imageBuffer.toString('base64');
          const base64Preview = base64Image.substring(0, 100) + '...';
          
          console.log('✅ Screenshot saved!');
          console.log('📊 Base64 Preview:', base64Preview);
          console.log('📏 Base64 Size:', base64Image.length, 'characters');
          console.log('🔗 Full Base64:');
          console.log(base64Image);
          
          // ذخیره base64 در فایل (اختیاری)
          fs.writeFileSync('screenshot-base64.txt', base64Image);
        })();
        EOF
        node screenshot.js
    
    - name: Commit
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add screenshot.png config.json screenshot-base64.txt
        git commit -m "📸 Screenshot + Base64 [skip ci]" || exit 0
        git push || exit 0
