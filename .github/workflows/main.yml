name: ONE EMAIL + CHECK (Fixed - No jq Error)

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: 'نام دلخواه'
        required: false
        default: 'test'

jobs:
  email-check:
    runs-on: ubuntu-latest
    steps:
      - name: Generate & Check REAL Email (Fixed)
        run: |
          NAME="${{ github.event.inputs.custom_name || 'ghaction' }}"
          RAND=$(shuf -i 1000-9999 -n 1)
          LOCAL="${NAME}${RAND}"
          DOMAIN="1secmail.com"
          EMAIL="$LOCAL@$DOMAIN"
          
          echo ""
          echo "🎉 ایمیل آماده: **$EMAIL**"
          echo "🔗 صندوق: https://1secmail.com/?login=$LOCAL&domain=$DOMAIN"
          echo ""
          
          echo "⏳ انتظار 20 ثانیه برای دریافت..."
          sleep 20
          
          echo "🔍 چک API (خام):"
          RESPONSE=$(curl -s "https://www.1secmail.com/api/v3/?action=getMessages&login=$LOCAL&domain=$DOMAIN")
          echo "$RESPONSE"
          
          if [ "$RESPONSE" != "[]" ] && [ "$RESPONSE" != "" ]; then
            echo "✅ ایمیل دریافت شد!"
            ID=$(echo $RESPONSE | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
            if [ ! -z "$ID" ]; then
              MSG=$(curl -s "https://www.1secmail.com/api/v3/?action=readMessage&login=$LOCAL&domain=$DOMAIN&id=$ID")
              echo "📨 متن ایمیل:"
              echo "$MSG"
            fi
          else
            echo "ℹ️  هنوز ایمیلی نرسیده - لینک بالا را باز کنید"
          fi
          
          echo ""
          echo "🚀 **لینک صندوق (کلیک کنید):** https://1secmail.com/?login=$LOCAL&domain=$DOMAIN"
