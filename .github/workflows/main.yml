name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const path = require("path");
        
        let browser = null;
        let page = null;
        let initialized = false;
        
        function wait(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        async function initBrowser() {
          console.log("🚀 راه‌اندازی مرورگر...");
          
          browser = await puppeteer.launch({
            headless: "new",
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-gpu",
              "--window-size=1920,1080"
            ]
          });
          
          page = await browser.newPage();
          await page.setViewport({ width: 1920, height: 1080 });
          
          console.log("🌐 ChatGPT...");
          await page.goto("https://chatgpt.com", { 
            waitUntil: 'networkidle0', 
            timeout: 45000 
          });
          
          await wait(4000);
          console.log("✅ آماده!");
        }
        
        async function takeScreenshot() {
          console.log("📸 Screenshot...");
          
          const screenshot = await page.screenshot({ 
            path: 'screenshot-full.png',
            fullPage: true,
            type: 'png'
          });
          
          const screenshotVisible = await page.screenshot({ 
            path: 'screenshot.png',
            type: 'png'
          });
          
          const buffer = await page.screenshot({ type: 'png' });
          fs.writeFileSync("screenshot-base64.txt", buffer.toString('base64'));
          
          console.log(`✅ Full: screenshot-full.png (${fs.statSync('screenshot-full.png').size}b)`);
          console.log(`✅ Visible: screenshot.png (${fs.statSync('screenshot.png').size}b)`);
          
          return true;
        }
        
        (async (cmd) => {
          try {
            if (!initialized) {
              await initBrowser();
              initialized = true;
            }
            
            if (cmd === "exit") {
              console.log("👋 خروج...");
              if (browser) await browser.close();
              process.exit(0);
            }
            
            if (cmd?.startsWith("click ")) {
              const [x, y] = cmd.slice(6).trim().split(",").map(Number);
              if (!isNaN(x) && !isNaN(y)) {
                console.log(`🖱️ Click ${x},${y}`);
                await page.mouse.click(x, y);
                await wait(2000);
              }
            }
            
            await takeScreenshot();
            console.log("🎉 تمام!");
            
          } catch(e) {
            console.error("💥 خطا:", e.message);
          }
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "Screenshot Bot"
        git config user.email "bot@github.com"
        
        echo "🔄 لوپ شروع..."
        rm -f last_command.txt browser_state.txt
        
        # ذخیره state مرورگر
        echo "initialized=false" > browser_state.txt
        
        while true; do
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            LAST_CMD=$(cat last_command.txt 2>/dev/null || echo "")
            
            if [ "$CONTENT" != "exit" ] && [ "$CONTENT" != "$LAST_CMD" ]; then
              echo "🆕 $CONTENT"
              
              # خواندن state
              if [ -f browser_state.txt ]; then
                source browser_state.txt
              fi
              
              # اجرای blocking
              node bot.js "$CONTENT"
              
              # ذخیره state جدید
              if [ "$initialized" = "true" ]; then
                echo "initialized=true" > browser_state.txt
              fi
              
              # چک screenshot ها
              for file in screenshot.png screenshot-full.png screenshot-base64.txt; do
                if [ -f "$file" ] && [ -s "$file" ]; then
                  echo "📁 $file: $(stat -c %s "$file") بایت"
                fi
              done
              
              git add -f screenshot*.png screenshot-base64.txt browser_state.txt || true
              git add -f bot.js .gitignore || true
              
              if git diff --staged --quiet; then
                echo "ℹ️  بدون تغییر"
              else
                git commit -m "📸 $CONTENT | $(date)"
                git push origin main || git push origin main --force
                echo "✅ Push OK!"
              fi
              
              echo "$CONTENT" > last_command.txt
            fi
          fi
          
          sleep 15
        done
