name: Check Temp Mail Inbox

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # هر 5 دقیقه

jobs:
  check-inbox:
    runs-on: ubuntu-latest
    steps:
      - name: Get temp email
        id: email
        run: |
          curl -s "https://www.1secmail.com/api/v1/?action=genRandomMailbox&count=1" | jq -r '.[0]' > email.txt
          echo "email=$(cat email.txt)" >> $GITHUB_OUTPUT
          echo "email=$(cat email.txt)" >> $GITHUB_ENV
      
      - name: Check inbox
        run: |
          EMAIL="${{ steps.email.outputs.email }}"
          DOMAIN=$(echo $EMAIL | cut -d'@' -f2)
          LOGIN=$(echo $EMAIL | cut -d'@' -f1)
          
          echo "Checking inbox for: $EMAIL"
          sleep 10  # صبر برای دریافت ایمیل
          
          curl -s "https://www.1secmail.com/api/v1/?action=getMessages&login=$LOGIN&domain=$DOMAIN" | jq .
          
          MSG_ID=$(curl -s "https://www.1secmail.com/api/v1/?action=getMessages&login=$LOGIN&domain=$DOMAIN" | jq -r '.[0].id // empty')
          if [ ! -z "$MSG_ID" ]; then
            echo "New email found! ID: $MSG_ID"
            curl -s "https://www.1secmail.com/api/v1/?action=readMessage&login=$LOGIN&domain=$DOMAIN&id=$MSG_ID" | jq .
          else
            echo "No new emails"
          fi
