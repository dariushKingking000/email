name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        console.log("🔥 COMMAND EXECUTING");
        
        (async(cmd) => {
          console.log("📝 CMD: " + cmd);
          
          const browser = await puppeteer.launch({
            headless: true,
            args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-gpu"]
          });
          
          console.log("✅ BROWSER OPEN");
          const page = await browser.newPage();
          await page.setViewport({width: 1920, height: 1080});
          
          console.log("🌐 LOADING CHATGPT");
          await page.goto("https://chatgpt.com", {waitUntil: 'domcontentloaded'});
          await new Promise(r=>setTimeout(r,4000));
          
          console.log("✅ PAGE READY");
          
          // Click command
          if (cmd.startsWith("click ")) {
            const parts = cmd.slice(6).trim().split(",");
            const x = parseInt(parts[0]);
            const y = parseInt(parts[1]);
            console.log(`🖱️ CLICKING ${x},${y}`);
            await page.mouse.click(x, y);
            await new Promise(r=>setTimeout(r,2000));
          }
          
          // Type command
          if (cmd.startsWith("type ")) {
            const text = cmd.slice(5).trim();
            console.log(`⌨️ TYPING: ${text}`);
            await page.keyboard.type(text, {delay: 100});
            await page.keyboard.press('Enter');
            await new Promise(r=>setTimeout(r,3000));
          }
          
          console.log("📸 TAKING SHOT");
          await page.screenshot({path: "screenshot.png", fullPage: true});
          
          await browser.close();
          console.log("✅ SHOT SAVED");
          
          const data = fs.readFileSync("screenshot.png").toString("base64");
          fs.writeFileSync("screenshot-base64.txt", data);
          console.log("🎉 COMPLETE - Files ready!");
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "ScreenshotBot"
        git config --global user.email "bot@gh.com"
        
        echo "🤖 Bot Active - 60s intervals"
        rm -f last_command.txt command.txt screenshot*
        
        COUNTER=0
        while true; do
          COUNTER=$((COUNTER + 1))
          echo "🔄 Check #$COUNTER (every 60s)"
          
          git pull origin main || true
          
          if [ -f command.txt ]; then
            CMD=$(cat command.txt)
            echo "🚀 EXECUTE: $CMD"
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CMD" ]; then
              node bot.js "$CMD"
              
              if [ -f screenshot.png ]; then
                git add screenshot.png screenshot-base64.txt bot.js .gitignore
                git commit -m "📸 $CMD" || true
                git push origin main || true
                echo "✅ COMMIT & PUSH OK!"
              else
                echo "❌ No screenshot.png!"
              fi
              
              echo "$CMD" > last_command.txt
            else
              echo "⏭️ Duplicate command"
            fi
            
            rm -f command.txt
          fi
          
          sleep 60
        done
