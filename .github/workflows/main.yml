name: Screenshot & Auto-Upload
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: Screenshot + Base64
      run: |
        npm init -y
        npm i puppeteer
        cat > screenshot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        const config = {
          url: 'https://chatgpt.com',
          width: 1920,
          height: 1080,
          timestamp: new Date().toISOString(),
          maxLoops: 30
        };
        fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        
        (async () => {
          const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox']});
          const page = await browser.newPage();
          await page.setViewport({width: config.width, height: config.height});
          await page.goto(config.url, {waitUntil: 'networkidle2', timeout: 15000});
          
          let lastCommand = '';
          
          for (let i = 0; i < config.maxLoops; i++) {
            console.log(`🔄 Loop ${i+1}/${config.maxLoops}`);
            
            // Check command.txt
            let command = '';
            if (fs.existsSync('command.txt')) {
              command = fs.readFileSync('command.txt', 'utf8').trim();
            }
            
            if (command && command !== lastCommand && 
                (command.startsWith('type ') || command.startsWith('click '))) {
              console.log(`🎯 Executing: ${command}`);
              
              if (command.startsWith('type ')) {
                const text = command.slice(5).trim();
                await page.keyboard.type(text);
                console.log(`✅ Typed: "${text}"`);
              } 
              else if (command.startsWith('click ')) {
                const [x, y] = command.slice(6).trim().split(' ').map(Number);
                await page.mouse.click(x, y);
                console.log(`✅ Clicked: ${x},${y}`);
              }
              lastCommand = command;
              await new Promise(r => setTimeout(r, 2000));
            }
            
            // Screenshot هر بار
            await page.screenshot({path: 'screenshot.png', fullPage: true});
            
            // هر 60 ثانیه صبر
            if (i < config.maxLoops - 1) {
              console.log('⏳ 60s wait...');
              await new Promise(r => setTimeout(r, 60000));
            }
          }
          
          await browser.close();
          
          const imageBuffer = fs.readFileSync('screenshot.png');
          const base64Image = imageBuffer.toString('base64');
          
          console.log('📸=== FULL BASE64 ===');
          console.log(base64Image.substring(0, 4000));  // Preview
          console.log('📏 Size:', base64Image.length);
          
          fs.writeFileSync('screenshot-base64.txt', base64Image);
          fs.writeFileSync('screenshot.png', imageBuffer);
          console.log('✅ Files ready!');
        })();
        EOF
        node screenshot.js
    
    - name: 🚀 Auto Upload & Get Raw Link
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "📤 Uploading Base64..."
        # Commit موقت برای آپلود
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add screenshot.png config.json screenshot-base64.txt command.txt
        git commit -m "📸 Auto-upload [$(date +%Y%m%d-%H%M)]"
        git push
        
        # Raw URL تولید
        SHA=$(git rev-parse HEAD)
        RAW_URL="https://raw.githubusercontent.com/dariushKingking000/email/${{ github.ref_name }}/${SHA}/screenshot-base64.txt"
        echo "✅ UPLOADED! 📱 Raw Link:"
        echo "🔗 ${RAW_URL}"
        echo "📱 Direct: ${RAW_URL}"
        echo "::notice:: Screenshot Base64 uploaded! Use: ${RAW_URL}"
        
        # ذخیره URL
        echo $RAW_URL > raw_url.txt
        cat raw_url.txt
    
    - name: ⏳ Wait 5 Minutes
      run: |
        echo "⏳ Waiting 5 minutes..."
        sleep 300
    
    - name: Final Commit (Cleanup)
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        echo "🧹 Final commit after delay" >> README.md
        git add README.md raw_url.txt
        git commit -m "⏰ Post-delay update [skip ci]" || exit 0
        git push || exit 0
