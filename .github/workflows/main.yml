name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip x11-xkb-utils
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm init -y && npm i puppeteer@latest
    
    - name: Setup Bot
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        browser_state.json
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        
        let browser = null;
        let page = null;
        
        async function init() {
          if (!browser) {
            console.log("🚀 مرورگر...");
            browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            page = await browser.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            
            // لود state
            let url = 'https://chatgpt.com';
            if (fs.existsSync('browser_state.json')) {
              try {
                const state = JSON.parse(fs.readFileSync('browser_state.json', 'utf8'));
                url = state.url || url;
              } catch(e){}
            }
            
            await page.goto(url, { waitUntil: 'networkidle0' });
            await new Promise(r => setTimeout(r, 3000));
            console.log("✅ URL:", page.url());
          }
          return page;
        }
        
        async function saveState() {
          if (page) {
            try {
              const state = { url: page.url() };
              fs.writeFileSync('browser_state.json', JSON.stringify(state));
            } catch(e){}
          }
        }
        
        (async(cmd) => {
          try {
            console.log("📄 " + cmd);
            const p = await init();
            
            if (cmd === "exit") {
              await browser.close();
              process.exit(0);
            }
            
            if (cmd.startsWith("click ")) {
              const [x, y] = cmd.slice(6).split(" ").map(Number);
              await p.mouse.click(x, y);
              console.log(`✅ کلیک ${x},${y}`);
            } 
            else if (cmd.startsWith("type ")) {
              const text = cmd.slice(5);
              await p.click('textarea, input[type="text"]');
              await p.keyboard.type(text);
              console.log(`✅ تایپ: ${text}`);
            }
            
            await new Promise(r => setTimeout(r, 2000));
            await p.screenshot({path: "screenshot.png", fullPage: true});
            fs.writeFileSync("screenshot-base64.txt", 
              fs.readFileSync("screenshot.png").toString("base64"));
            
            await saveState();
            console.log("✅OK");
          } catch(e) {
            console.log("❌", e.message);
          }
        })(process.argv[2]);
        EOF
    
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 -ac -noreset &
        sleep 3
        
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            cmd=$(cat command.txt)
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$cmd" ]; then
              echo "🆕 $cmd"
              node bot.js "$cmd"
              git add screenshot* browser_state.json .gitignore
              git commit -m "📸$cmd" || true
              git push || true
              echo "$cmd" > last_command.txt
            fi
            rm -f command.txt
          fi
          
          sleep 30
        done
