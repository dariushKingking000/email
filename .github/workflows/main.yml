name: Screenshot Bot (Real Upload)
on: [push]
permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - name: 🔄 Checkout + Setup
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🖥️ Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    - name: 🔄 MAIN LOOP - Execute Commands Until EXIT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        npm init -y && npm i puppeteer@22.12.1
        echo 'const puppeteer = require("puppeteer");const fs = require("fs");(async(cmdContent)=>{console.log("📄 "+cmdContent);const browser=await puppeteer.launch({headless:"new",args:["--no-sandbox"]});const page=await browser.newPage();await page.setViewport({width:1920,height:1080});await page.goto("https://chatgpt.com",{waitUntil:"networkidle2"});if(cmdContent&&cmdContent!=="exit"){console.log("🚀 "+cmdContent);if(cmdContent.startsWith("click ")){const parts=cmdContent.slice(6).split(" ");const x=parseInt(parts[0]);const y=parseInt(parts[1]);await page.mouse.click(x,y);console.log("🖱️ "+x+","+y);await new Promise(r=>setTimeout(r,2000));}else if(cmdContent.startsWith("type ")){await page.keyboard.type(cmdContent.slice(5));console.log("⌨️ تایپ");await new Promise(r=>setTimeout(r,1000));}}await page.screenshot({path:"screenshot.png",fullPage:true});await browser.close();const imgBuffer=fs.readFileSync("screenshot.png");const base64=imgBuffer.toString("base64");fs.writeFileSync("screenshot-base64.txt",base64);console.log("✅ Files OK");})(process.argv[2]);' > bot.js
        
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        
        LOOP=1
        while [ $LOOP -eq 1 ]; do
          echo "🔍 Loop check ($(date +%H:%M:%S))"
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          
          if [ -f "command.txt" ]; then
            CONTENT=$(cat command.txt | head -1 | xargs)
            if [ "$CONTENT" = "exit" ]; then
              echo "🛑 EXIT command found!"
              LOOP=0
            elif [ -n "$CONTENT" ]; then
              echo "✅ '$CONTENT'"
              node bot.js "$CONTENT"
              
              git add screenshot.png screenshot-base64.txt || true
              git commit -m "📸 [$(date +%H:%M)] $CONTENT" || true
              git push origin HEAD:${{ github.ref_name }} || true
              echo "📤 Uploaded screenshot"
            fi
          fi
          
          echo "⏳ Wait 30s..."
          sleep 30
        done
        
        echo "🎉 Loop finished - 5min delay"
        sleep 300
        
        echo "$(date +%H:%M): Loop complete" >> history.txt
        git add history.txt || true
        git commit -m "⏰ Final - Loop Complete" || true
        git push origin HEAD:${{ github.ref_name }} || true
