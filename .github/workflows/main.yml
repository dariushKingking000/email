name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip x11-xkb-utils
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm init -y && npm i puppeteer@latest
    
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        browser_pid.txt
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const { spawn } = require("child_process");

        let browserProcess = null;
        let page = null;

        async function getExistingBrowser() {
          try {
            if (fs.existsSync("browser_pid.txt")) {
              const pid = fs.readFileSync("browser_pid.txt", "utf8").trim();
              // چک کن پروسه هنوز زنده است
              spawn("kill", ["-0", pid], { stdio: "ignore" });
              console.log("🔄 مرورگر قبلی پیدا شد");
              return true;
            }
          } catch (e) {
            console.log("❌ مرورگر قبلی مرده");
          }
          return false;
        }

        (async(cmd) => {
          console.log("📄" + cmd);
          
          const existing = await getExistingBrowser();
          
          if (!existing) {
            console.log("🚀 مرورگر جدید");
            browserProcess = spawn("puppeteer", ["browser"], {
              stdio: "ignore",
              detached: true
            });
            fs.writeFileSync("browser_pid.txt", browserProcess.pid.toString());
            
            const b = await puppeteer.launch({
              headless: false,
              args: [
                '--no-sandbox', 
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--remote-debugging-port=9222'
              ],
              executablePath: require('puppeteer').executablePath()
            });
            page = await b.newPage();
            await page.setViewport({ width: 1920, height: 1080 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            await new Promise(r => setTimeout(r, 5000));
          } else {
            console.log("🔗 اتصال به مرورگر قبلی");
            const b = await puppeteer.connect({
              browserURL: 'http://127.0.0.1:9222'
            });
            page = (await b.pages())[0];
          }
          
          if (cmd && cmd !== "exit") {
            if (cmd.startsWith("click ")) {
              const [x, y] = cmd.slice(6).split(" ").map(Number);
              console.log(`🖱️ کلیک: ${x} ${y}`);
              await page.mouse.move(x, y, { steps: 10 });
              await new Promise(r => setTimeout(r, 200));
              await page.mouse.down({ button: 'left' });
              await new Promise(r => setTimeout(r, 50));
              await page.mouse.up({ button: 'left' });
              console.log(`✅ کلیک شد (${x},${y})`);
            } else if (cmd.startsWith("type ")) {
              const text = cmd.slice(5);
              console.log(`⌨️ تایپ: ${text}`);
              await page.click('textarea');
              await new Promise(r => setTimeout(r, 500));
              for(let char of text) {
                await page.keyboard.down(char);
                await new Promise(r => setTimeout(r, 80));
                await page.keyboard.up(char);
              }
              console.log(`✅ تایپ شد: ${text}`);
            }
          }
          
          await new Promise(r => setTimeout(r, 3000));
          await page.screenshot({path: "screenshot.png", fullPage: true});
          fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
          console.log("✅OK");
        })(process.argv[2]);
        EOF
    
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt browser_pid.txt
        
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 -ac -noreset &
        XVFB_PID=$!
        sleep 3
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                node bot.js "$CONTENT"
                git add screenshot* .gitignore browser_pid.txt
                git commit -m "📸$CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                rm -f browser_pid.txt
                pkill -f puppeteer || true
                exit 0
              fi
            else
              echo "🔄 تکراری: $CONTENT"
              COUNTER=$((COUNTER + 1))
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست"
            rm -f last_command.txt browser_pid.txt
            pkill -f puppeteer || true
            COUNTER=0
          fi
          
          sleep 5
        done
