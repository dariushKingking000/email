name: Screenshot Bot (Real Upload)
on: [push]
permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - name: 🔄 Checkout + Setup
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🖥️ Setup Chrome
      uses: browser-actions/setup-chrome@v1
    
    - name: 📦 Install Node + Puppeteer
      run: |
        npm init -y
        npm i puppeteer@24.15.0
    
    - name: 🧹 Create .gitignore + Bot
      run: |
        cat > .gitignore << 'EOF'
node_modules/
bot.js
package.json
package-lock.json
screenshot.png
screenshot-base64.txt
command.txt
EOF
        
        cat > bot.js << 'EOF'
const puppeteer = require("puppeteer");
const fs = require("fs");

(async (cmd) => {
  console.log("📄 " + cmd);
  const browser = await puppeteer.launch({
    headless: "new",
    args: ["--no-sandbox", "--disable-setuid-sandbox"]
  });
  const page = await browser.newPage();
  await page.setViewport({ width: 1920, height: 1080 });
  await page.goto("https://chatgpt.com", { waitUntil: "networkidle2" });
  
  if (cmd && cmd !== "exit") {
    console.log("🚀 " + cmd);
    if (cmd.startsWith("click ")) {
      const [x, y] = cmd.slice(6).split(" ").map(Number);
      await page.mouse.click(x, y);
      console.log("🖱️ " + x + "," + y);
      await new Promise(r => setTimeout(r, 2000));
    } else if (cmd.startsWith("type ")) {
      await page.keyboard.type(cmd.slice(5), { delay: 50 });
      console.log("⌨️ تایپ");
      await new Promise(r => setTimeout(r, 1500));
    }
  }
  
  await page.screenshot({ path: "screenshot.png", fullPage: true });
  await browser.close();
  
  const img = fs.readFileSync("screenshot.png");
  const base64 = img.toString("base64");
  fs.writeFileSync("screenshot-base64.txt", base64);
  console.log("✅ Files OK");
})(process.argv[2]);
EOF
        
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .gitignore bot.js package.json package-lock.json
        git commit -m "🤖 Setup bot + .gitignore" || true
        git push origin main || true
    
    - name: 🔄 MAIN LOOP - Execute Commands
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LOOP=1
        while [ $LOOP -eq 1 ]; do
          echo "🔍 Loop check ($(date +%H:%M:%S))"
          git fetch origin main
          git reset --hard origin/main
          
          if [ -f "command.txt" ]; then
            CONTENT=$(cat command.txt | head -1 | xargs)
            if [ "$CONTENT" = "exit" ]; then
              echo "🛑 EXIT command!"
              LOOP=0
            elif [ -n "$CONTENT" ]; then
              echo "✅ '$CONTENT'"
              node bot.js "$CONTENT"
              
              git add screenshot.png screenshot-base64.txt || true
              git commit -m "📸 [$(date +%H:%M:%S)] $CONTENT" || true
              git push origin main || true
              echo "📤 Screenshot uploaded"
            fi
          fi
          
          echo "⏳ Wait 30s..."
          sleep 30
        done
        
        echo "🎉 Loop finished!"
