name: Screenshot & Auto-Upload
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: Check command.txt & Screenshot
      run: |
        npm init -y
        npm i puppeteer
        
        # چک کردن command.txt
        if [ -f "command.txt" ]; then
          echo "✅ command.txt پیدا شد!"
          CMD=$(cat command.txt)
          echo "URL سفارشی: $CMD"
          URL="$CMD"
        else
          echo "❌ command.txt نیست - ChatGPT پیش‌فرض"
          URL="https://chatgpt.com"
        fi
        
        cat > screenshot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        const config = {
          url: process.env.URL || 'https://chatgpt.com',
          width: 1920,
          height: 1080,
          timestamp: new Date().toISOString()
        };
        fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        
        (async () => {
          const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox']});
          const page = await browser.newPage();
          await page.setViewport({width: config.width, height: config.height});
          await page.goto(config.url, {waitUntil: 'networkidle2', timeout: 15000});
          await page.screenshot({path: 'screenshot.png', fullPage: true});
          await browser.close();
          
          const imageBuffer = fs.readFileSync('screenshot.png');
          const base64Image = imageBuffer.toString('base64');
          
          console.log('📸=== FULL BASE64 ===');
          console.log(base64Image.substring(0, 4000));
          console.log('📏 Size:', base64Image.length);
          
          fs.writeFileSync('screenshot-base64.txt', base64Image);
          fs.writeFileSync('screenshot.png', imageBuffer);
          console.log('✅ Files ready!');
        })();
        EOF
        
        export URL="$URL"
        node screenshot.js
    
    - name: 🚀 Auto Upload & Get Raw Link
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add screenshot.png config.json screenshot-base64.txt
        git commit -m "📸 Auto-upload [$(date +%Y%m%d-%H%M)]"
        git push
        
        SHA=$(git rev-parse HEAD)
        RAW_URL="https://raw.githubusercontent.com/dariushKingking000/email/${{ github.ref_name }}/${SHA}/screenshot-base64.txt"
        echo "✅ UPLOADED! Raw Link: ${RAW_URL}"
        echo $RAW_URL > raw_url.txt
