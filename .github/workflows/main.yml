name: Screenshot Bot (Wait + Commands)
on: [push]
permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: ⏳ Wait for command.txt (30x 1min)
      id: wait-cmd
      run: |
        FOUND=0
        for i in {1..30}; do
          echo "🔍 $i/30 ($(date +%H:%M:%S))"
          
          # آپدیت repo
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          
          if [ -f "command.txt" ]; then
            CONTENT=$(cat command.txt | head -1 | xargs)
            if [ -n "$CONTENT" ]; then
              echo "✅ پیدا شد: '$CONTENT'"
              echo "content=$CONTENT" >> $GITHUB_OUTPUT
              FOUND=1
              break
            fi
          fi
          echo "⏳ خالی - 1 دقیقه صبر"
          sleep 60
        done
        
        if [ $FOUND -eq 0 ]; then
          echo "content=" >> $GITHUB_OUTPUT
          echo "❌ 30 دقیقه - خالی موند"
        fi
    
    - name: 🤖 Execute + Screenshot
      env:
        CMD_CONTENT: ${{ steps.wait-cmd.outputs.content }}
      run: |
        npm init -y
        npm i puppeteer
        
        cat > bot.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        const cmdContent = process.env.CMD_CONTENT || '';
        console.log(`📄 Final command: "${cmdContent}"`);
        
        (async () => {
          const browser = await puppeteer.launch({headless: true, args: ['--no-sandbox']});
          const page = await browser.newPage();
          await page.setViewport({width: 1920, height: 1080});
          
          await page.goto('https://chatgpt.com', {waitUntil: 'networkidle2', timeout: 30000});
          
          if (cmdContent) {
            console.log(`🚀 اجرای: ${cmdContent}`);
            
            if (cmdContent.startsWith('click ')) {
              const coords = cmdContent.slice(6).split(' ');
              if (coords.length === 2) {
                const x = parseInt(coords[0]), y = parseInt(coords[1]);
                await page.mouse.click(x, y);
                console.log(`🖱️ کلیک: ${x},${y}`);
                await new Promise(r => setTimeout(r, 2000));
              }
            } 
            else if (cmdContent.startsWith('type ')) {
              const text = cmdContent.slice(5);
              await page.keyboard.type(text);
              console.log(`⌨️ تایپ: "${text}"`);
              await new Promise(r => setTimeout(r, 1000));
            }
          }
          
          await page.screenshot({path: 'screenshot.png', fullPage: true});
          await browser.close();
          
          const base64Image = fs.readFileSync('screenshot.png').toString('base64');
          fs.writeFileSync('screenshot-base64.txt', base64Image);
          fs.writeFileSync('log.txt', `Command: ${cmdContent}`);
          console.log('✅ تمام!');
        })().catch(e => {
          console.error('❌ خطا:', e.message);
          process.exit(1);
        });
        EOF
        
        node bot.js
    
    - name: 🚀 Upload
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add screenshot* log.txt *.txt
        git commit -m "🤖 [$(date +%Y%m%d-%H%M)]"
        git push
        
        RAW_URL="https://raw.githubusercontent.com/dariushKingking000/email/${{ github.ref_name }}/${{ github.sha }}/screenshot-base64.txt"
        echo "$RAW_URL" > raw_url.txt
    
    - name: ⏳ Wait 5m
      run: sleep 300
    
    - name: Final
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        echo "$(date): $(cat raw_url.txt)" >> history.txt
        git add raw_url.txt history.txt
        git commit -m "⏰ [skip ci]" || true
        git push || true
