name: Screenshot Bot
on: push
permissions:
  contents: write
jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1
    - name: Install
      run: npm init -y && npm i puppeteer
    - name: Setup
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        screenshot.png
        screenshot-base64.txt
        command.txt
        last_command.txt
        browser_state.json
        EOF
        
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const path = require("path");
        
        let browser = null;
        let page = null;
        let isInitialized = false;
        
        async function initBrowser() {
          if (browser) return;
          
          console.log("🚀 راه‌اندازی مرورگر...");
          browser = await puppeteer.launch({
            headless: "new",
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-accelerated-2d-canvas",
              "--no-first-run",
              "--no-zygote",
              "--disable-gpu",
              "--disable-web-security",
              "--disable-features=VizDisplayCompositor"
            ]
          });
          page = await browser.newPage();
          
          await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
          await page.setExtraHTTPHeaders({
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8',
            'Accept-Language': 'en-US,en;q=0.9',
            'Accept-Encoding': 'gzip, deflate, br',
            'DNT': '1',
            'Connection': 'keep-alive',
            'Upgrade-Insecure-Requests': '1',
          });
          
          await page.setViewport({width: 1920, height: 1080});
          await page.goto("https://chatgpt.com", { 
            waitUntil: 'networkidle2',
            timeout: 60000 
          });
          
          await new Promise(r => setTimeout(r, 3000));
          await page.evaluate(() => window.scrollTo(0, document.body.scrollHeight));
          await new Promise(r => setTimeout(r, 2000));
          
          isInitialized = true;
          console.log("✅ مرورگر آماده");
        }
        
        (async(cmd) => {
          console.log("📄" + (cmd || "screenshot"));
          
          try {
            await initBrowser();
            
            if (cmd && cmd !== "exit") {
              if (cmd.startsWith("click ")) {
                // 🆕 FIX: پارس دقیق مختصات
                const clickData = cmd.slice(6).trim().split(",");
                if (clickData.length === 2) {
                  const x = parseFloat(clickData[0]);
                  const y = parseFloat(clickData[1]);
                  
                  if (!isNaN(x) && !isNaN(y)) {
                    console.log(`🖱️ کلیک: ${x},${y}`);
                    await page.mouse.click(x, y);
                    await new Promise(r => setTimeout(r, 3000));
                  } else {
                    console.log("❌ مختصات نامعتبر");
                  }
                } else {
                  console.log("❌ فرمت: click X,Y");
                }
              }
            }
            
            await page.screenshot({path: "screenshot.png", fullPage: true});
            fs.writeFileSync("screenshot-base64.txt", fs.readFileSync("screenshot.png").toString("base64"));
            console.log("✅OK");
            
          } catch (error) {
            console.error("❌ خطا:", error.message);
            if (browser) {
              await browser.close();
              browser = null;
              isInitialized = false;
            }
          }
        })(process.argv[2]);
        EOF
    - name: LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name bot
        git config user.email bot@github.com
        
        rm -f last_command.txt browser_state.json
        
        COUNTER=0
        while true; do
          git pull origin main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            
            if [ ! -f last_command.txt ] || [ "$(cat last_command.txt)" != "$CONTENT" ]; then
              if [ "$CONTENT" != "exit" ]; then
                echo "🆕 دستور جدید: $CONTENT"
                node bot.js "$CONTENT"
                git add screenshot* .gitignore bot.js
                git commit -m "📸$CONTENT" || true
                git push || true
                
                echo "$CONTENT" > last_command.txt
                COUNTER=0
              else
                echo "🛑 خروج"
                exit 0
              fi
            else
              echo "🔄 دستور تکراری: $CONTENT - screenshot جدید"
              node bot.js ""
              git add screenshot*
              git commit -m "🔄 بروزرسانی $CONTENT" || true
              git push || true
            fi
          else
            echo "⏳ منتظر command.txt..."
            COUNTER=$((COUNTER + 1))
          fi
          
          if [ $COUNTER -ge 30 ]; then
            echo "🔄 ریست کامل"
            rm -f last_command.txt browser_state.json
            COUNTER=0
          fi
          
          sleep 60
        done
